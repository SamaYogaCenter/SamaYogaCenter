<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sama Yoga | Content Manager</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: #f5f0e8;
      font-family: 'Jost', -apple-system, sans-serif;
      color: #2d2520;
      min-height: 100vh;
    }

    /* Loading screen — auto-hides via CSS after 2 s, no JS needed */
    #sama-loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: #f5f0e8;
      z-index: 9999;
      cursor: pointer;
      /* Fade out after 2 s — pure CSS, cannot be broken by JS errors */
      animation: sama-hide 0.6s ease 2s forwards;
    }

    @keyframes sama-hide {
      to { opacity: 0; visibility: hidden; pointer-events: none; }
    }

    #sama-loading img {
      width: 150px;
      height: auto;
      opacity: 0.9;
    }

    #sama-loading p {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.1rem;
      color: #7a6e67;
      letter-spacing: 0.04em;
    }

    #sama-loading small {
      display: block;
      font-family: 'Jost', sans-serif;
      font-size: 0.7rem;
      color: #b0a9a4;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: -8px;
    }

    .sama-dot {
      display: inline-block;
      animation: dot-pulse 1.4s infinite;
    }
    .sama-dot:nth-child(2) { animation-delay: 0.2s; }
    .sama-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dot-pulse {
      0%, 80%, 100% { opacity: 0.2; transform: translateY(0); }
      40%            { opacity: 1;   transform: translateY(-3px); }
    }
  </style>
</head>
<body>

  <!-- Branded loading screen. Auto-hides via CSS after 2 s.
       Click anywhere to dismiss immediately. -->
  <div id="sama-loading" onclick="this.style.display='none'">
    <img src="/images/sama-yoga-logo.webp" alt="Sama Yoga Center">
    <p>Content Manager</p>
    <small>
      Loading
      <span class="sama-dot">·</span>
      <span class="sama-dot">·</span>
      <span class="sama-dot">·</span>
    </small>
  </div>

  <!-- Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    /* Preview pane styles */
    try {
      CMS.registerPreviewStyle(`
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Jost:wght@300;400;500;600&display=swap');
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Jost', sans-serif; background: #f5f0e8; padding: 28px 20px; color: #2d2520; }
        .ph { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 600; text-align: center; margin-bottom: 8px; }
        .ps { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: #a89e98; text-align: center; margin-bottom: 24px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.875rem; background: white; }
        th { background: #2d2520; color: white; text-align: left; padding: 9px 14px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; }
        td { padding: 9px 14px; border-bottom: 1px solid #ede8e0; vertical-align: top; line-height: 1.4; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #faf8f4; }
        .live   { display:inline-block; padding: 2px 8px; border-radius: 99px; font-size:0.7rem; font-weight:600; text-transform:uppercase; background:#d4edda; color:#1a6630; }
        .hidden { display:inline-block; padding: 2px 8px; border-radius: 99px; font-size:0.7rem; font-weight:600; text-transform:uppercase; background:#f5e0d0; color:#a04020; }
        .price { font-weight:600; color:#c0392b; }
      `);
    } catch(e) {}

    /* Preview template */
    try {
      if (typeof React !== 'undefined') {
        var ce = React.createElement;
        CMS.registerPreviewTemplate('events', function(props) {
          var evs = props.entry.getIn(['data','events']);
          if (!evs || !evs.size) return ce('p', {className:'ps'}, 'No events yet.');
          return ce('div', null,
            ce('p', {className:'ph'}, 'sama yoga events'),
            ce('p', {className:'ps'}, 'Preview of your events list'),
            ce('table', null,
              ce('thead', null, ce('tr', null,
                ce('th',null,'Event'), ce('th',null,'Date'), ce('th',null,'From'), ce('th',null,'Status')
              )),
              ce('tbody', null, evs.map(function(ev, i) {
                var price = ev.getIn(['pricing', 0, 'price'], '');
                return ce('tr', {key:i},
                  ce('td', null, ce('strong', null, ev.get('title','—'))),
                  ce('td', null, ev.get('date','—')),
                  ce('td', null, price ? ce('span',{className:'price'}, price) : '—'),
                  ce('td', null, ce('span', {className: ev.get('hidden') ? 'hidden' : 'live'}, ev.get('hidden') ? 'Hidden' : 'Live'))
                );
              }).toArray())
            )
          );
        });
      }
    } catch(e) {}
  </script>

</body>
</html>
