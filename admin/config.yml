backend:
  name: git-gateway
  branch: main

logo_url: /images/sama-yoga-logo.webp

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "events"
    label: "Upcoming Events"
    files:
      - name: "events"
        label: "Events List"
        file: "data/events.json"
        fields:
          - name: "events"
            label: "Events"
            label_singular: "Event"
            widget: "list"
            summary: "{{fields.title}} — {{fields.date}}"
            fields:
              - { label: "Event Title", name: "title", widget: "string", hint: "e.g. Mini Retreat: Breathe & Bloom" }
              - { label: "Instructor Name", name: "instructor", widget: "string", required: false, hint: "e.g. Dr. Katie Takayasu  (shown under the title)" }
              - { label: "Date", name: "date", widget: "string", hint: "Shown on the site — e.g. Saturday, May 9th, 2026" }
              - { label: "Date for auto-hide", name: "dateISO", widget: "string", required: false, hint: "Format: YYYY-MM-DD (e.g. 2026-05-09). The site will automatically stop showing this event after this date." }
              - { label: "Time", name: "time", widget: "string", hint: "e.g. 1:00–3:00 PM" }
              - { label: "Hide this event", name: "hidden", widget: "boolean", default: false, required: false, hint: "Turn on to remove this event from the site without deleting it — useful for archiving." }
              - { label: "URL Slug", name: "id", widget: "string", hint: "Short ID for this event — lowercase, hyphens only, no spaces. e.g. womens-health  (used for the 'learn more' anchor link)" }
              - { label: "Event Photo", name: "image", widget: "image", hint: "Upload the event image. Square or tall crops work best." }
              - { label: "Photo focus point", name: "imagePosition", widget: "string", default: "center top", required: false, hint: "Controls which part of the photo is visible. Options: center top · center · center bottom · center 60%  — leave blank to use center top." }
              - { label: "Show on Teacher Training page", name: "showOnTrainingPage", widget: "boolean", default: false, required: false, hint: "Turn on to also feature this event in the Further Education section of the Teacher Training page." }
              - { label: "Short Description", name: "cardDescription", widget: "text", hint: "1–2 sentences shown on the event card in the carousel. Keep it punchy." }
              - { label: "Full Description", name: "description", widget: "markdown", hint: "The full event detail — shown in the expanded section below the carousel. Use bold, bullets, and line breaks freely." }
              - label: "Pricing Options"
                name: "pricing"
                widget: "list"
                summary: "{{fields.label}}: {{fields.price}}"
                hint: "Add one row per pricing tier (e.g. Early Bird, Member, General)."
                fields:
                  - { label: "Tier Label", name: "label", widget: "string", hint: "e.g. Early Bird (by May 14th) · Member · General · Master Class Bundle" }
                  - { label: "Price", name: "price", widget: "string", hint: "e.g. $95" }
                  - { label: "MindBody Service ID", name: "serviceId", widget: "string", required: false, hint: "The Service ID from MindBody for this pricing tier — powers the Register button. Ask Abby if unsure." }
                  - { label: "Register Link (fallback)", name: "link", widget: "string", default: "#", required: false, hint: "Only needed if there is no MindBody Service ID above." }
