backend:
  name: git-gateway
  branch: main

logo_url: /images/sama-yoga-logo.webp

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "events"
    label: "Upcoming Events"
    files:
      - name: "events"
        label: "Events List"
        file: "data/events.json"
        fields:
          - name: "events"
            label: "Events"
            label_singular: "Event"
            widget: "list"
            summary: "{{fields.title}} — {{fields.date}}"
            fields:
              - { label: "Event Title", name: "title", widget: "string", hint: "e.g. Mini Retreat: Breathe & Bloom" }
              - { label: "Instructor Name", name: "instructor", widget: "string", required: false, hint: "e.g. Dr. Katie Takayasu  (shown under the title)" }
              - { label: "Date", name: "date", widget: "string", hint: "Shown on the site — e.g. Saturday, May 9th, 2026" }
              - { label: "Date for auto-hide", name: "dateISO", widget: "string", required: false, hint: "Format: YYYY-MM-DD (e.g. 2026-05-09). The site will automatically stop showing this event after this date." }
              - { label: "Time", name: "time", widget: "string", hint: "e.g. 1:00-3:00 PM  (use a plain hyphen, no spaces)" }
              - { label: "Hide this event", name: "hidden", widget: "boolean", default: false, required: false, hint: "Turn on to remove this event from the site without deleting it — useful for archiving." }
              - { label: "URL Slug", name: "id", widget: "string", hint: "Short ID for this event — lowercase, hyphens only, no spaces. e.g. womens-health  (used for the 'learn more' anchor link)" }
              - { label: "Event Photo", name: "image", widget: "image", hint: "Upload the event image. Square or tall crops work best." }
              - { label: "Photo focus point", name: "imagePosition", widget: "string", default: "center top", required: false, hint: "Controls which part of the photo is visible. Options: center top · center · center bottom · center 60%  — leave blank to use center top." }
              - { label: "Show on Teacher Training page", name: "showOnTrainingPage", widget: "boolean", default: false, required: false, hint: "Turn on to also feature this event in the Further Education section of the Teacher Training page." }
              - { label: "Short Description", name: "cardDescription", widget: "text", hint: "1–2 sentences shown on the event card in the carousel. Keep it punchy." }
              - { label: "Full Description", name: "description", widget: "markdown", hint: "The full event detail — shown in the expanded section below the carousel. Use bold, bullets, and line breaks freely." }
              - label: "Pricing Options"
                name: "pricing"
                widget: "list"
                summary: "{{fields.label}}: {{fields.price}}"
                hint: "Add one row per pricing tier (e.g. Early Bird, Member, General)."
                fields:
                  - { label: "Tier Label", name: "label", widget: "string", hint: "e.g. Early Bird (by May 14th) · Member · General · Master Class Bundle" }
                  - { label: "Price", name: "price", widget: "string", hint: "e.g. $95" }
                  - { label: "MindBody Service ID", name: "serviceId", widget: "string", required: false, hint: "The Service ID from MindBody for this pricing tier — powers the Register button. Ask Abby if unsure." }
                  - { label: "Register Link (fallback)", name: "link", widget: "string", default: "#", required: false, hint: "Only needed if there is no MindBody Service ID above." }

  - name: "classes"
    label: "Class Descriptions"
    files:
      - name: "classes"
        label: "Class List"
        file: "data/classes.json"
        fields:
          - name: "classes"
            label: "Classes"
            label_singular: "Class"
            widget: "list"
            summary: "{{fields.title}}"
            hint: "Drag to reorder. Use 'Hide this class' to remove from the site without deleting."
            fields:
              - { label: "Class Title", name: "title", widget: "string", hint: "e.g. sama vinyasa  (use lowercase)" }
              - { label: "Description", name: "description", widget: "text", hint: "1–2 sentences shown on the class page." }
              - { label: "Photo", name: "image", widget: "image", hint: "Upload or select the class photo." }
              - { label: "Photo Alt Text", name: "imageAlt", widget: "string", required: false, hint: "Short description of the photo for screen readers (e.g. Vinyasa)." }
              - { label: "Hide this class", name: "hidden", widget: "boolean", default: false, required: false, hint: "Turn on to remove this class from the site without deleting it." }

  - name: "team"
    label: "Our Team"
    files:
      - name: "team"
        label: "Team Members"
        file: "data/team.json"
        fields:
          - name: "weekly"
            label: "Weekly Instructors"
            label_singular: "Instructor"
            widget: "list"
            summary: "{{fields.name}}"
            hint: "Drag to reorder. These appear in the 'weekly instructors' carousel."
            fields:
              - { label: "Name", name: "name", widget: "string", hint: "First name only, e.g. Allie" }
              - { label: "Photo", name: "image", widget: "image" }
              - { label: "Photo Focus Point", name: "imagePosition", widget: "string", default: "center top", required: false, hint: "Controls which part of the photo is visible. Options: center top · 50% 20% · 50% 30% — leave blank to use center top." }
              - { label: "Hide this instructor", name: "hidden", widget: "boolean", default: false, required: false, hint: "Turn on to remove from the site without deleting." }
              - { label: "Bio", name: "bio", widget: "text", hint: "Use two blank lines to create paragraph breaks." }
          - name: "substitutes"
            label: "Substitute & Guest Instructors"
            label_singular: "Instructor"
            widget: "list"
            summary: "{{fields.name}}"
            hint: "Drag to reorder. These appear in the 'substitute & guest instructors' carousel."
            fields:
              - { label: "Name", name: "name", widget: "string", hint: "First name only, e.g. Anna" }
              - { label: "Photo", name: "image", widget: "image" }
              - { label: "Photo Focus Point", name: "imagePosition", widget: "string", default: "center top", required: false, hint: "Controls which part of the photo is visible. Options: center top · 50% 20% · 50% 30% — leave blank to use center top." }
              - { label: "Hide this instructor", name: "hidden", widget: "boolean", default: false, required: false, hint: "Turn on to remove from the site without deleting." }
              - { label: "Bio", name: "bio", widget: "text", hint: "Use two blank lines to create paragraph breaks." }

  - name: "private-lessons"
    label: "Private Lessons"
    files:
      - name: "private-lessons"
        label: "Private Lessons Page"
        file: "data/private-lessons.json"
        fields:
          - { label: "Top Photo", name: "image1", widget: "image", hint: "Photo shown on the left in the top block." }
          - { label: "Introduction Text", name: "blurb", widget: "text", hint: "1–2 sentences describing private lessons." }
          - { label: "Bottom Photo", name: "image2", widget: "image", hint: "Photo shown on the right in the pricing block." }
          - name: "pricing"
            label: "Pricing Tiers"
            label_singular: "Pricing Tier"
            widget: "list"
            summary: "{{fields.label}}: {{fields.price}}"
            hint: "Add one row per pricing tier. Drag to reorder."
            fields:
              - { label: "Label", name: "label", widget: "string", hint: "e.g. Single Lesson" }
              - { label: "Price", name: "price", widget: "string", hint: "e.g. $190 / lesson" }

  - name: "teacher-training"
    label: "Teacher Training"
    files:
      - name: "teacher-training"
        label: "Teacher Training Page"
        file: "data/teacher-training.json"
        fields:
          - name: "sectionOrder"
            label: "Section Order"
            widget: "list"
            hint: "Drag the sections up or down to change the order they appear on the page (from just under the intro down to the reviews). Any section you leave off the list will stay at the end."
            field:
              label: "Section"
              name: "section"
              widget: "select"
              options:
                - { label: "The Sama Method", value: "sama-method" }
                - { label: "FAQ — Questions You Might Have", value: "faq" }
                - { label: "What You'll Learn / What's Included", value: "cover" }
                - { label: "Schedule + Graduation Requirements", value: "schedule" }
                - { label: "Cost", value: "cost" }
          - { label: "Intro — Tagline (top line)", name: "introTagline", widget: "string", required: false, hint: "Small line above the main heading — e.g. Learn to Teach the Person, Not Just the Pose." }
          - { label: "Intro — Heading", name: "introHeading", widget: "string", required: false, hint: "The big heading at the top — e.g. yoga teacher training + mentorship (shown in lowercase)." }
          - { label: "Section Title — What You'll Learn", name: "coverHeading", widget: "string", required: false, hint: "Heading of the left box in the 'what you'll learn / what's included' row." }
          - { label: "Section Title — What's Included", name: "includedHeading", widget: "string", required: false }
          - { label: "Section Title — Schedule", name: "scheduleHeading", widget: "string", required: false }
          - { label: "Section Title — Graduation Requirements", name: "gradReqHeading", widget: "string", required: false }
          - { label: "Section Title — Cost", name: "costHeading", widget: "string", required: false }
          - { label: "Section Title — FAQ", name: "faqHeading", widget: "string", required: false }
          - { label: "Intro Blurb", name: "introBody", widget: "text", hint: "The paragraphs under the main heading. Wrap text in **double asterisks** to bold it, and leave a blank line between paragraphs. Update the season here (e.g. Spring / Fall)." }
          - { label: "Sama Method — Heading", name: "samaMethodHeading", widget: "string", hint: "e.g. What is the Sama Method?®  (displayed in lowercase to match the page style)" }
          - { label: "Sama Method — Body", name: "samaMethodBody", widget: "text", hint: "The Sama Method description. Leave a blank line between paragraphs." }
          - name: "customSections"
            label: "Your Own Sections (add / edit / reorder)"
            label_singular: "Section"
            widget: "list"
            summary: "{{fields.title}}"
            collapsed: true
            required: false
            hint: "Add your own content sections. They appear after the Sama Method, in this order (drag to reorder). Each has a title and a body. Leave a blank line between paragraphs; wrap text in **double asterisks** to bold."
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Body", name: "body", widget: "text" }
          - name: "whatWeWillCover"
            label: "What We Will Cover"
            label_singular: "Item"
            widget: "list"
            hint: "Bulleted list shown in the 'what we will cover' box. Drag to reorder."
            field: { label: "Item", name: "item", widget: "string" }
          - name: "whatsIncluded"
            label: "What's Included"
            label_singular: "Item"
            widget: "list"
            hint: "Bulleted list shown in the 'what's included' box. Drag to reorder."
            field: { label: "Item", name: "item", widget: "string" }
          - { label: "Schedule Time", name: "scheduleTime", widget: "string", hint: "e.g. weekends, 12:30–3:30pm  (use an em dash –)" }
          - name: "scheduleDates"
            label: "Weekend Training Dates"
            label_singular: "Date"
            widget: "list"
            summary: "{{fields.date}}"
            hint: "Add one entry per weekend session. Drag to reorder."
            fields:
              - { label: "Date Range", name: "date", widget: "string", hint: "e.g. April 18–19  (use an em dash –)" }
          - { label: "Graduation Date", name: "graduationDate", widget: "string", hint: "e.g. June 6–7" }
          - { label: "Schedule Photo", name: "scheduleImage", widget: "image", hint: "Photo shown beside the schedule and graduation requirements." }
          - name: "graduationRequirements"
            label: "Graduation Requirements"
            label_singular: "Requirement"
            widget: "list"
            summary: "{{fields.requirement}}"
            hint: "Add one entry per requirement. Drag to reorder."
            fields:
              - { label: "Requirement", name: "requirement", widget: "string" }
          - { label: "Cost — Intro line", name: "costIntro", widget: "text", required: false, hint: "The line above the cost box — e.g. Become a Yoga Alliance® Certified Yoga Teacher and learn to teach the person—not just the pose." }
          - { label: "Cost — In-Person", name: "costFullProgram", widget: "string", hint: "e.g. $3,500" }
          - { label: "Cost — Online (Live via Zoom)", name: "costOnline", widget: "string", required: false, hint: "e.g. $3,500. Leave blank to hide the online row." }
          - { label: "Cost — Payment Plan", name: "costPaymentPlan", widget: "string", hint: "e.g. contact for details" }
          - { label: "Cost — Tuition Includes line", name: "tuitionIncludes", widget: "text", required: false, hint: "Shown above the register buttons. Start with 'Tuition Includes:' — everything up to the first colon is bolded automatically." }
          - { label: "Online Registration Link", name: "costOnlineLink", widget: "string", required: false, hint: "MindBody payment link used by the 'Register — Online' button." }
          - name: "faqs"
            label: "FAQ — Questions You Might Have"
            label_singular: "Question"
            widget: "list"
            summary: "{{fields.question}}"
            hint: "Drag to reorder. Each item is a question and its answer. Leave a blank line in the answer to start a new paragraph."
            fields:
              - { label: "Question", name: "question", widget: "string" }
              - { label: "Answer", name: "answer", widget: "text" }
              - { label: "Button Label (optional)", name: "buttonLabel", widget: "string", required: false, hint: "Adds a call-to-action button under this answer, e.g. Reserve My Spot. Leave blank for no button." }
              - { label: "Button Link (optional)", name: "buttonLink", widget: "string", required: false, hint: "Where the button goes. Leave blank to scroll to the cost / register section." }
          - name: "reviews"
            label: "Graduate Reviews"
            label_singular: "Review"
            widget: "list"
            summary: "{{fields.author}}"
            hint: "Drag to reorder. Each review shows a photo, quote, and author name."
            fields:
              - { label: "Photo", name: "avatar", widget: "image", hint: "Headshot of the reviewer — shown as a circle." }
              - { label: "Author Name", name: "author", widget: "string", hint: "e.g. Megan  or  Jennifer D." }
              - { label: "Quote", name: "quote", widget: "text", hint: "The review text — do not include quotation marks, they are added automatically." }

  - name: "kids"
    label: "Sama Kids"
    files:
      - name: "kids"
        label: "Sama Kids Page"
        file: "data/kids.json"
        fields:
          - { label: "Page Heading", name: "heading", widget: "string", hint: "e.g. sama kids  (use lowercase)" }
          - { label: "Intro Paragraph 1", name: "intro1", widget: "text", hint: "Main intro paragraph. Basic HTML allowed for bold (<strong>) and links (<a>)." }
          - { label: "Intro Paragraph 2 (Pricing note)", name: "intro2", widget: "text", hint: "Shown below the first intro paragraph. Basic HTML allowed for bold (<strong>)." }
          - { label: "MindBody Service ID", name: "mindbodyServiceId", widget: "string", hint: "The MindBody service ID for the 'BUY PACKAGE' button. Contact Abby if you need to change this." }
          - { label: "Intro Photo", name: "photo1", widget: "image", hint: "Photo shown in the intro section (right side)." }
          - { label: "Instructor Name", name: "instructorName", widget: "string", hint: "e.g. Allie Muzzio" }
          - { label: "Instructor Photo", name: "instructorPhoto", widget: "image", hint: "Photo shown in the 'meet your instructor' section." }
          - { label: "Instructor Bio — Paragraph 1", name: "instructorBio1", widget: "text" }
          - { label: "Instructor Bio — Paragraph 2", name: "instructorBio2", widget: "text" }
          - { label: "Instructor Bio — Paragraph 3", name: "instructorBio3", widget: "text" }
          - { label: "FAQ Photo", name: "photo2", widget: "image", hint: "Photo shown beside the FAQ section." }
          - name: "faqs"
            label: "FAQs"
            label_singular: "FAQ"
            widget: "list"
            summary: "{{fields.question}}"
            hint: "Drag to reorder. Add or remove FAQ items as needed."
            fields:
              - { label: "Question", name: "question", widget: "string" }
              - { label: "Answer", name: "answer", widget: "text" }
