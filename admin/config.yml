backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "events"
    label: "Upcoming Events"
    files:
      - name: "events"
        label: "Events List"
        file: "data/events.json"
        fields:
          - name: "events"
            label: "Events"
            label_singular: "Event"
            widget: "list"
            summary: "{{fields.title}} — {{fields.date}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Instructor", name: "instructor", widget: "string", required: false, hint: "e.g. with Dr. Katie Takayasu" }
              - { label: "Date", name: "date", widget: "string", hint: "e.g. Saturday, May 9th, 2026" }
              - { label: "Time", name: "time", widget: "string", hint: "e.g. 1:00–3:00 PM" }
              - { label: "Anchor ID", name: "id", widget: "string", hint: "Lowercase, no spaces, e.g. womens-health. Used for 'learn more' links." }
              - { label: "Event Image", name: "image", widget: "image" }
              - { label: "Image Position", name: "imagePosition", widget: "string", default: "center top", required: false, hint: "CSS object-position, e.g. center top, center bottom, center 60%" }
              - { label: "Show on Teacher Training page", name: "showOnTrainingPage", widget: "boolean", default: false, required: false, hint: "Enable to also display this event in the 'Further Education' section of the Teacher Training page." }
              - { label: "Short Description (for event card)", name: "cardDescription", widget: "text", hint: "2-3 sentences shown in the top carousel card." }
              - { label: "Full Description", name: "description", widget: "markdown", hint: "Full detail shown in the 'learn more' section below." }
              - label: "Pricing Options"
                name: "pricing"
                widget: "list"
                summary: "{{fields.label}}: {{fields.price}}"
                fields:
                  - { label: "Label", name: "label", widget: "string", hint: "e.g. Early Bird, Member, General, Master Class Bundle" }
                  - { label: "Price", name: "price", widget: "string", hint: "e.g. $95" }
                  - { label: "Register Link", name: "link", widget: "string", default: "#", required: false }
