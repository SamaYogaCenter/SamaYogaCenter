name: Sync Events to Eventbrite

# Runs automatically:
#   • whenever events.json is updated on main (i.e. a save in the Decap CMS admin), and
#   • once a day, so new events publish and past events unpublish on their own.
# Can also be triggered manually from the Actions tab in GitHub.

on:
  push:
    branches: [main]
    paths:
      - 'data/events.json'
  schedule:
    - cron: '0 8 * * *'   # daily at 08:00 UTC (~3–4am ET): publishes new events, unpublishes past ones
  workflow_dispatch:   # Manual trigger — useful for testing or a full re-sync

jobs:
  sync:
    runs-on: ubuntu-latest

    # Needs write permission so it can commit the updated eventbrite-ids.json back
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Sync events to Eventbrite
        run: node scripts/sync-eventbrite.js
        env:
          # ── Add this as a GitHub Secret ─────────────────────────────────────
          # Repo Settings → Secrets and variables → Actions → New repository secret
          #
          #   EVENTBRITE_TOKEN  → your Eventbrite private token
          #                       (eventbrite.com/platform/api-keys → "Create API Key")
          #
          # The organization is discovered automatically from the token. Only add
          # EVENTBRITE_ORGANIZATION_ID if your account has more than one organization
          # and you need to target a specific one.
          # ────────────────────────────────────────────────────────────────────
          EVENTBRITE_TOKEN:           ${{ secrets.EVENTBRITE_TOKEN }}
          EVENTBRITE_ORGANIZATION_ID: ${{ secrets.EVENTBRITE_ORGANIZATION_ID }}

      - name: Commit updated Eventbrite IDs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/eventbrite-ids.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update Eventbrite event IDs [skip ci]"
            git push
          else
            echo "No changes to eventbrite-ids.json — nothing to commit."
          fi
