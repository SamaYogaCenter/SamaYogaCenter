<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sama Social Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Dancing+Script:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&family=Nunito:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" crossorigin="anonymous"></script>

  <style>
  /* ── Reset ───────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── Tool UI ─────────────────────────────────────────── */
  body {
    font-family: 'Nunito', sans-serif;
    background: #f0ede8;
    color: #2d2d2d;
    height: 100vh;
    overflow: hidden;
  }

  /* Lock Screen */
  #lock {
    position: fixed; inset: 0;
    background: #ece8e2;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 18px; z-index: 1000;
  }
  #lock-logo { height: 54px; object-fit: contain; }
  #lock h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px; font-weight: 400;
    letter-spacing: .06em; color: #2d2d2d;
  }
  #lock-sub {
    font-family: 'Montserrat', sans-serif;
    font-size: 10px; letter-spacing: .18em;
    text-transform: uppercase; color: #bbb;
  }
  .lock-row { display: flex; gap: 8px; margin-top: 6px; }
  #lock-pw {
    padding: 10px 16px;
    border: 1px solid #ccc; border-radius: 4px;
    font-family: 'Nunito', sans-serif; font-size: 15px;
    background: white; outline: none; width: 180px;
  }
  #lock-pw:focus { border-color: #b03060; }
  #lock-err { color: #b03060; font-size: 12px; height: 16px; }

  /* Buttons */
  .btn-pink {
    background: #b03060; color: white; border: none;
    padding: 10px 22px; border-radius: 4px;
    font-family: 'Montserrat', sans-serif;
    font-size: 12px; font-weight: 700;
    letter-spacing: .08em; cursor: pointer;
  }
  .btn-pink:hover { background: #932852; }
  .btn-pink:disabled { background: #ccc; cursor: default; }

  /* Studio */
  #studio { display: none; height: 100vh; }
  #studio.on { display: flex; }

  /* ── Sidebar ─────────────────────────────────────────── */
  #sidebar {
    width: 276px; min-width: 276px;
    background: white; border-right: 1px solid #e0dbd4;
    display: flex; flex-direction: column; overflow: hidden;
  }
  #sb-head {
    padding: 14px 18px 12px;
    border-bottom: 1px solid #eee;
    flex-shrink: 0;
  }
  #sb-head img { height: 28px; }
  #sb-head span {
    display: block;
    font-family: 'Montserrat', sans-serif;
    font-size: 9px; font-weight: 700;
    letter-spacing: .18em; color: #bbb;
    text-transform: uppercase; margin-top: 5px;
  }
  #tpl-section { padding: 12px 14px 8px; border-bottom: 1px solid #eee; flex-shrink: 0; }
  #tpl-section > label {
    font-family: 'Montserrat', sans-serif;
    font-size: 9px; font-weight: 700;
    letter-spacing: .15em; color: #bbb;
    text-transform: uppercase; display: block; margin-bottom: 8px;
  }
  .tpl-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
  .tpl-btn {
    background: #f7f5f2; border: 1.5px solid transparent;
    border-radius: 6px; padding: 7px 4px 6px;
    cursor: pointer; text-align: center;
    font-family: 'Nunito', sans-serif;
    font-size: 10px; color: #777; line-height: 1.3;
    transition: all .15s;
  }
  .tpl-btn .ico { font-size: 16px; display: block; margin-bottom: 2px; }
  .tpl-btn:hover { border-color: #d0a0b5; }
  .tpl-btn.active { border-color: #b03060; background: #fdf0f5; color: #b03060; font-weight: 700; }

  /* Options panel */
  #options { flex: 1; overflow-y: auto; padding: 14px; }
  .og { margin-bottom: 14px; }
  .ol {
    font-family: 'Montserrat', sans-serif;
    font-size: 9px; font-weight: 700;
    letter-spacing: .12em; color: #bbb;
    text-transform: uppercase; display: block; margin-bottom: 5px;
  }
  .oi, .os, .ota {
    width: 100%; padding: 7px 10px;
    border: 1px solid #ddd; border-radius: 4px;
    font-family: 'Nunito', sans-serif;
    font-size: 13px; background: white;
    color: #2d2d2d; outline: none;
  }
  .oi:focus, .os:focus, .ota:focus { border-color: #b03060; }
  .ota { resize: vertical; min-height: 64px; line-height: 1.5; }
  .hint { font-size: 11px; color: #bbb; margin-top: 4px; }
  .odiv { border: none; border-top: 1px solid #eee; margin: 12px 0; }
  .oradio { display: flex; gap: 10px; }
  .oradio label {
    display: flex; align-items: center; gap: 5px;
    font-size: 13px; cursor: pointer;
  }

  /* Photo picker button */
  .ppbtn {
    width: 100%; padding: 7px 10px;
    border: 1.5px dashed #ccc; border-radius: 5px;
    background: #fafafa; cursor: pointer;
    display: flex; align-items: center; gap: 9px;
    font-family: 'Nunito', sans-serif;
    font-size: 12px; color: #999; transition: border-color .15s;
  }
  .ppbtn:hover { border-color: #b03060; }
  .ppthumb { width: 40px; height: 40px; object-fit: cover; border-radius: 3px; flex-shrink: 0; }
  .ppempty {
    width: 40px; height: 40px; background: #eee;
    border-radius: 3px; display: flex;
    align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }

  /* ── Preview Area ────────────────────────────────────── */
  #preview-area {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px; gap: 18px; overflow: hidden;
  }
  #preview-wrap {
    position: relative;
    box-shadow: 0 8px 40px rgba(0,0,0,.18);
    border-radius: 2px; overflow: hidden;
    background: #ccc; flex-shrink: 0;
  }
  #tpl-full { transform-origin: top left; width: 1080px; position: relative; }
  #dl-bar { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
  #dl-btn {
    background: #b03060; color: white; border: none;
    padding: 11px 28px; border-radius: 4px;
    font-family: 'Montserrat', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: .1em; cursor: pointer; text-transform: uppercase;
  }
  #dl-btn:hover { background: #932852; }
  #dl-btn:disabled { background: #ccc; cursor: default; }
  #dl-info {
    font-family: 'Montserrat', sans-serif;
    font-size: 10px; letter-spacing: .08em;
    color: #bbb; text-transform: uppercase;
  }

  /* ── Photo Modal ─────────────────────────────────────── */
  #photo-modal {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.55);
    z-index: 600; display: none;
    align-items: center; justify-content: center;
  }
  #photo-modal.open { display: flex; }
  #pm-inner {
    background: white; border-radius: 8px;
    width: 580px; max-height: 78vh;
    display: flex; flex-direction: column; overflow: hidden;
  }
  #pm-hdr {
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 14px 20px; border-bottom: 1px solid #eee;
  }
  #pm-hdr h3 {
    font-family: 'Montserrat', sans-serif;
    font-size: 12px; font-weight: 700;
    letter-spacing: .1em; text-transform: uppercase;
  }
  #pm-close {
    background: none; border: none;
    font-size: 20px; cursor: pointer; color: #888;
  }
  .pm-tabs { display: flex; border-bottom: 1px solid #eee; }
  .pm-tab {
    padding: 9px 20px; background: none; border: none;
    border-bottom: 2px solid transparent;
    font-family: 'Nunito', sans-serif;
    font-size: 13px; cursor: pointer; color: #999;
  }
  .pm-tab.active { color: #b03060; border-bottom-color: #b03060; font-weight: 700; }
  #pm-body { flex: 1; overflow-y: auto; padding: 16px; }
  .pm-pane { display: none; }
  .pm-pane.active { display: block; }
  #upload-zone {
    border: 2px dashed #ddd; border-radius: 8px;
    padding: 36px; text-align: center; cursor: pointer;
  }
  #upload-zone:hover { border-color: #b03060; }
  #upload-zone input { display: none; }
  .uz-ico { font-size: 36px; color: #ccc; }
  #upload-zone p { font-size: 13px; color: #aaa; margin-top: 8px; }
  .photos-grid {
    display: grid; grid-template-columns: repeat(4,1fr); gap: 7px;
  }
  .photos-grid img {
    width: 100%; aspect-ratio: 1; object-fit: cover;
    border-radius: 4px; cursor: pointer;
    border: 2px solid transparent; transition: border-color .15s;
  }
  .photos-grid img:hover { border-color: #b03060; }


  /* ── Mode Tabs (Studio / Calendar) ──────────────────── */
  #mode-tabs {
    display: flex; flex-shrink: 0;
    border-bottom: 1px solid #eee;
  }
  .mode-tab {
    flex: 1; padding: 9px 6px; border: none;
    background: none; cursor: pointer;
    font-family: 'Montserrat', sans-serif;
    font-size: 10px; font-weight: 700;
    letter-spacing: .10em; text-transform: uppercase;
    color: #bbb; transition: color .15s;
    border-bottom: 2px solid transparent;
  }
  .mode-tab:hover { color: #b03060; }
  .mode-tab.active { color: #b03060; border-bottom-color: #b03060; }

  /* ── Calendar sidebar ────────────────────────────────── */
  #cal-controls {
    display: none; flex-direction: column;
    flex: 1; overflow: hidden;
  }
  #cal-picker {
    padding: 10px 14px 8px; border-bottom: 1px solid #eee; flex-shrink: 0;
    display: flex; gap: 7px; align-items: flex-end;
  }
  #cal-picker .og { margin-bottom: 0; flex: 1; }
  #cal-picker .og:last-child { flex: 0 0 70px; }
  #cal-key-sidebar {
    flex: 1; overflow-y: auto; padding: 14px 14px 10px;
    font-family: 'Nunito', sans-serif; font-size: 11.5px;
  }
  .cal-sb-heading {
    font-family: 'Montserrat', sans-serif;
    font-size: 9px; font-weight: 700;
    letter-spacing: .15em; text-transform: uppercase;
    color: #bbb; margin-bottom: 8px; display: block;
  }
  .cal-sb-event {
    color: #444; margin-bottom: 7px; line-height: 1.35;
  }
  .cal-sb-legend {
    margin-top: 16px;
  }
  .cal-custom-item {
    display: flex; align-items: flex-start; gap: 6px;
    margin-bottom: 5px; font-size: 11px;
  }
  .cal-custom-item-text {
    flex: 1; color: #333; line-height: 1.35;
  }
  .cal-custom-item-day {
    font-family: 'Montserrat', sans-serif;
    font-size: 10px; font-weight: 700;
    color: #b03060; white-space: nowrap; flex-shrink: 0;
    padding-top: 1px;
  }
  .cal-custom-del {
    background: none; border: none; color: #ccc;
    cursor: pointer; font-size: 13px; line-height: 1;
    padding: 0; flex-shrink: 0;
  }
  .cal-custom-del:hover { color: #b03060; }

  .cal-sb-chip {
    display: inline-block; padding: 3px 10px;
    border-radius: 4px; font-size: 10px; font-weight: 700;
    margin: 2px 2px 0 0;
  }

  /* ── Calendar main area ──────────────────────────────── */
  #cal-area {
    display: none; flex: 1; overflow: auto;
    padding: 28px 32px 24px;
    background: #f7f5f2;
    flex-direction: column;
  }
  #cal-canvas {
    background: white; border-radius: 12px;
    padding: 30px 32px 28px;
    box-shadow: 0 2px 18px rgba(0,0,0,.07);
    min-width: 800px;
  }
  .cal-hdr {
    display: flex; align-items: baseline;
    gap: 18px; margin-bottom: 22px; flex-wrap: wrap;
  }
  .cal-hdr-month {
    font-family: 'Nunito', sans-serif;
    font-size: 52px; font-weight: 900;
    color: #0d1a3e; line-height: 1; flex-shrink: 0;
  }
  .cal-hdr-year {
    font-family: 'Montserrat', sans-serif;
    font-size: 26px; font-weight: 300;
    color: #0d1a3e; flex-shrink: 0;
  }
  .cal-hdr-brand {
    margin-left: auto;
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px; font-weight: 400;
    color: #0d1a3e; white-space: nowrap;
  }
  .cal-body-wrap {
    display: flex; gap: 20px;
  }
  .cal-left {
    width: 170px; flex-shrink: 0;
  }
  .cal-left-heading {
    font-family: 'Nunito', sans-serif;
    font-size: 12px; font-weight: 800;
    color: #0d1a3e; margin-bottom: 10px;
  }
  .cal-left-divider {
    border: none; border-top: 1px solid #ddd; margin: 12px 0;
  }
  .cal-left-event {
    font-family: 'Nunito', sans-serif;
    font-size: 11px; color: #444;
    margin-bottom: 8px; line-height: 1.38;
  }
  .cal-platform-label {
    font-family: 'Nunito', sans-serif;
    font-size: 14px; font-weight: 800;
    color: #0d1a3e; margin-bottom: 10px;
  }
  .cal-legend-chip {
    display: block; padding: 4px 10px;
    border-radius: 4px; font-size: 10.5px;
    font-weight: 700; margin-bottom: 5px;
    text-align: center;
  }
  .cal-grid-wrap { flex: 1; }
  .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    border-left: 1.5px solid #d4d0db;
    border-top: 1.5px solid #d4d0db;
  }
  .cal-col-hdr {
    border-right: 1.5px solid #d4d0db;
    border-bottom: 1.5px solid #d4d0db;
    padding: 7px 4px; text-align: center;
    font-family: 'Montserrat', sans-serif;
    font-size: 12px; font-weight: 600;
    color: #2d3a6a;
  }
  .cal-cell {
    border-right: 1.5px solid #d4d0db;
    border-bottom: 1.5px solid #d4d0db;
    padding: 7px 7px 8px;
    min-height: 90px; vertical-align: top;
  }
  .cal-cell-num {
    font-family: 'Nunito', sans-serif;
    font-size: 13px; font-weight: 700;
    color: #2d3a6a; display: block; margin-bottom: 4px;
  }
  .cal-cell-num.dim { color: #ccc; }
  .cal-chip {
    display: block; font-size: 9.5px; font-weight: 700;
    padding: 3px 6px; border-radius: 3px;
    margin-bottom: 3px; line-height: 1.35;
    text-align: center;
  }
  #cal-dl-bar {
    margin-top: 16px; text-align: center; flex-shrink: 0;
  }

  /* ══════════════════════════════════════════════════════
     TEMPLATE STYLES — all measured at 1080px canvas width
     ══════════════════════════════════════════════════════ */

  .tpl { position: relative; width: 100%; overflow: hidden; }

  /* Beige diamond-crosshatch background */
  .tpl-beige {
    background-color: #ece8e2;
    background-image:
      repeating-linear-gradient( 45deg, transparent, transparent 24px, rgba(80,55,30,.06) 24px, rgba(80,55,30,.06) 25px),
      repeating-linear-gradient(-45deg, transparent, transparent 24px, rgba(80,55,30,.06) 24px, rgba(80,55,30,.06) 25px);
  }

  /* ── Animation keyframes (10-second clip preview) ─────── */
  @keyframes floatIn {
    from { opacity: 0; transform: translateY(26px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes photo1Fade {
    0%,44%  { opacity: 1; }
    56%,100%{ opacity: 0; }
  }
  @keyframes photo2Fade {
    0%,44%  { opacity: 0; }
    56%,100%{ opacity: 1; }
  }

  </style>
</head>
<body>

<!-- ── Lock Screen ───────────────────────────────────────── -->
<div id="lock">
  <img id="lock-logo" src="/images/sama-yoga-logo.webp" alt="Sama Yoga" onerror="this.style.display='none'">
  <h1>Social Studio</h1>
  <p id="lock-sub">Internal Tool · Sama Yoga Center</p>
  <div class="lock-row">
    <input id="lock-pw" type="password" placeholder="Password" autocomplete="off">
    <button class="btn-pink" onclick="unlock()">Enter</button>
  </div>
  <div id="lock-err"></div>
</div>

<!-- ── Studio ────────────────────────────────────────────── -->
<div id="studio">

  <div id="sidebar">
    <div id="sb-head">
      <img src="/images/sama-yoga-logo.webp" alt="Sama Yoga" onerror="this.style.display='none'">
      <span>Social Studio</span>
    </div>

    <div id="mode-tabs">
      <button class="mode-tab active" id="tab-studio" onclick="setMode('studio')">🎨 Studio</button>
      <button class="mode-tab" id="tab-calendar" onclick="setMode('calendar')">📅 Calendar</button>
    </div>

    <!-- ── Calendar sidebar controls ───────────────────── -->
    <div id="cal-controls">
      <div id="cal-picker">
        <div class="og">
          <label class="ol">Month</label>
          <select class="os" id="cal-month-sel" onchange="updateCalendar()">
            <option value="0">January</option><option value="1">February</option>
            <option value="2">March</option><option value="3">April</option>
            <option value="4">May</option><option value="5">June</option>
            <option value="6">July</option><option value="7">August</option>
            <option value="8">September</option><option value="9">October</option>
            <option value="10">November</option><option value="11">December</option>
          </select>
        </div>
        <div class="og">
          <label class="ol">Year</label>
          <input class="oi" id="cal-year-inp" type="number" value="2026" min="2024" max="2030" oninput="updateCalendar()">
        </div>
      </div>
      <!-- ── Custom key dates ──────────────────────────── -->
      <div id="cal-custom-section" style="padding:10px 14px 8px;border-bottom:1px solid #eee;flex-shrink:0">
        <span class="cal-sb-heading">Add Key Date</span>
        <div style="display:flex;gap:5px;align-items:stretch;margin-bottom:8px">
          <input class="oi" id="cal-custom-name" placeholder="Event name…"
                 style="flex:1;margin-bottom:0"
                 onkeydown="if(event.key==='Enter')addCalCustomEvent()">
          <input class="oi" id="cal-custom-day" type="number" min="1" max="31"
                 placeholder="Day"
                 style="flex:0 0 52px;margin-bottom:0;text-align:center"
                 onkeydown="if(event.key==='Enter')addCalCustomEvent()">
          <button class="btn-pink" onclick="addCalCustomEvent()"
                  style="padding:6px 10px;font-size:11px;letter-spacing:.04em;flex-shrink:0">+</button>
        </div>
        <div id="cal-custom-list"></div>
      </div>
      <div id="cal-key-sidebar"></div>
    </div>

    <div id="tpl-section">
      <label>Social Posts</label>
      <div class="tpl-grid" id="tpl-grid"></div>
    </div>

    <div id="nl-section" style="padding:10px 14px 8px;border-bottom:1px solid #eee;flex-shrink:0">
      <label style="font-family:'Montserrat',sans-serif;font-size:9px;font-weight:700;letter-spacing:.15em;color:#bbb;text-transform:uppercase;display:block;margin-bottom:8px">Newsletter</label>
      <div class="tpl-grid" id="nl-grid"></div>
    </div>

    <div id="options"></div>
  </div>

  <div id="preview-area">
    <div id="preview-wrap">
      <div id="tpl-full"></div>
    </div>
    <div id="dl-bar">
      <button class="btn-pink" id="dl-btn" onclick="download()">⬇&nbsp; Download PNG</button>
      <button class="btn-pink" id="vid-btn" onclick="downloadVideo()" style="display:none;background:#5a2c5a">▶&nbsp; Download Video (10s)</button>
      <span id="dl-info"></span>
    </div>

    <!-- ── Calendar view (shown in Calendar mode) ──────── -->
    <div id="cal-area">
      <div id="cal-canvas">
        <div class="cal-hdr">
          <div class="cal-hdr-month" id="cal-hdr-m"></div>
          <div class="cal-hdr-year"  id="cal-hdr-y"></div>
          <div class="cal-hdr-brand">Business Content Calendar ♦</div>
        </div>
        <div class="cal-body-wrap">
          <div class="cal-left" id="cal-left-col"></div>
          <div class="cal-grid-wrap">
            <div class="cal-grid" id="cal-grid"></div>
          </div>
        </div>
      </div>
      <div id="cal-dl-bar">
        <button class="btn-pink" onclick="downloadCalendar()">⬇&nbsp; Download Calendar PNG</button>
      </div>
    </div>

  </div>

</div>

<!-- ── Photo Picker Modal ─────────────────────────────────── -->
<div id="photo-modal">
  <div id="pm-inner">
    <div id="pm-hdr">
      <h3>Choose Photo</h3>
      <button id="pm-close" onclick="closeModal()">✕</button>
    </div>
    <div class="pm-tabs">
      <button class="pm-tab active" onclick="pmTab('upload',this)">Upload</button>
      <button class="pm-tab"        onclick="pmTab('site',this)">Site Photos</button>
    </div>
    <div id="pm-body">
      <div id="pm-upload" class="pm-pane active">
        <label id="upload-zone">
          <div class="uz-ico">📷</div>
          <p>Click to upload from your device</p>
          <input type="file" accept="image/*" onchange="handleUpload(event)">
        </label>
      </div>
      <div id="pm-site" class="pm-pane">
        <div class="photos-grid" id="site-grid">
          <p style="font-size:13px;color:#aaa;grid-column:1/-1;padding:8px 0">Loading…</p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ── Script ─────────────────────────────────────────────── -->
<script>
'use strict';

// ════════════════════════════════════════════════════════
// CONFIG  ← change PASSWORD to your chosen one-word password
// ════════════════════════════════════════════════════════
const PASSWORD = 'sama';       // ← change this
const PINK     = '#b03060';
const LOGO_URL = '/images/sama-yoga-logo.webp';
const _V       = '?v=' + Date.now();   // cache-buster — forces fresh image on every page load
const ENZO_BG  = '/images/Social%20Media/background.png'  + _V;

// ── Data ─────────────────────────────────────────────────
let events = [];
let instructors = [];
let sitePhotos = [];

// ── Lock ─────────────────────────────────────────────────
function unlock() {
  const v = document.getElementById('lock-pw').value.trim().toLowerCase();
  if (v === PASSWORD.toLowerCase()) {
    document.getElementById('lock').style.display = 'none';
    document.getElementById('studio').classList.add('on');
    init();
  } else {
    document.getElementById('lock-err').textContent = 'Incorrect password.';
  }
}
document.getElementById('lock-pw').addEventListener('keydown', e => { if (e.key==='Enter') unlock(); });

// ── Init ─────────────────────────────────────────────────
async function init() {
  buildGrid();
  pickTpl('event-post');

  // Load data
  try {
    const d = await fetch('data/events.json?v='+Date.now()).then(r=>r.json());
    events = (d.events||[]).filter(e=>!e.hidden);
  } catch(e) {}
  try {
    const d = await fetch('data/team.json?v='+Date.now()).then(r=>r.json());
    instructors = [
      ...(d.weekly||[]).filter(i=>!i.hidden).map(i=>({...i,grp:'Weekly'})),
      ...(d.substitutes||[]).filter(i=>!i.hidden).map(i=>({...i,grp:'Substitute & Guest'})),
    ];
  } catch(e) {}

  // Collect site photo URLs
  const imgs = new Set();
  events.forEach(e=>{ if(e.image) imgs.add(e.image); });
  instructors.forEach(i=>{ if(i.image) imgs.add(i.image); });
  try {
    const d = await fetch('data/classes.json?v='+Date.now()).then(r=>r.json());
    (d.classes||[]).forEach(c=>{ if(c.image) imgs.add(c.image); });
  } catch(e) {}
  sitePhotos = [...imgs];
  buildSiteGrid();

  // Set defaults
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  S.tipsMonth  = months[new Date().getMonth()];
  S.monthLabel = months[new Date().getMonth()].toUpperCase();
  DEFAULT_QS.forEach((q,i)=>{ S['q'+(i+1)] = q; });

  if (events.length) selectEvent(0);
  if (instructors.length) selectInst(0);
  renderOpts();
  updatePreview();
}

// ── Template grid ────────────────────────────────────────
function buildGrid() {
  const toBtn = t =>
    `<button class="tpl-btn" id="tb-${t.id}" onclick="pickTpl('${t.id}')">
       <span class="ico">${t.ico}</span>${t.label}
     </button>`;
  document.getElementById('tpl-grid').innerHTML =
    TMPLS.filter(t => !t.id.startsWith('nl-')).map(toBtn).join('');
  document.getElementById('nl-grid').innerHTML =
    TMPLS.filter(t =>  t.id.startsWith('nl-')).map(toBtn).join('');
}

function pickTpl(id) {
  S.tpl = id;
  document.querySelectorAll('.tpl-btn').forEach(b=>b.classList.remove('active'));
  const b = document.getElementById('tb-'+id);
  if (b) b.classList.add('active');
  renderOpts();
  updatePreview();
  const t = TMPLS.find(x=>x.id===id)||TMPLS[0];
  document.getElementById('dl-info').textContent = `${t.w} × ${t.h} px`;
  document.getElementById('vid-btn').style.display =
    ['event-post','event-story','event-card'].includes(id) ? '' : 'none';
}

// Options helpers
function oCardHeight() {
  const h = S.nlHeight != null ? S.nlHeight : 700;
  return `<div class="og"><label class="ol">Card Height</label>
    <div style="display:flex;align-items:center;gap:8px">
      <button class="os" style="width:42px;cursor:pointer;font-size:18px;line-height:1" onclick="bumpHeight(-50)">−</button>
      <span style="min-width:70px;text-align:center;font-weight:600">${h} px</span>
      <button class="os" style="width:42px;cursor:pointer;font-size:18px;line-height:1" onclick="bumpHeight(50)">+</button>
    </div>
    <p class="hint">Width stays 1200px. Card also grows automatically if text is long.</p>
  </div>`;
}
function bumpHeight(delta) {
  const cur = S.nlHeight != null ? S.nlHeight : 700;
  S.nlHeight = Math.max(500, Math.min(1600, cur + delta));
  renderOpts(); updatePreview();
}
function oTextSize() {
  const cur = S.nlTextScale != null ? S.nlTextScale : 1;
  const opts = [['0.8','Smallest'],['0.9','Smaller'],['1','Default'],['1.1','Larger'],['1.2','Largest']];
  return `<div class="og"><label class="ol">Text Size</label>
    <select class="os" onchange="set('nlTextScale',+this.value)">
      ${opts.map(([v,l])=>`<option value="${v}" ${Math.abs(cur-parseFloat(v))<0.001?'selected':''}>${l}</option>`).join('')}
    </select></div>`;
}
function oEvent() {
  if (!events.length) return `<div class="og"><p class="hint">No events found.</p></div>`;
  return `<div class="og"><label class="ol">Event</label>
    <select class="os" onchange="selectEvent(+this.value)">
      ${events.map((e,i)=>`<option value="${i}" ${S.eventIdx===i?'selected':''}>${x(e.title)}</option>`).join('')}
    </select></div>`;
}
function oInst() {
  if (!instructors.length) return `<div class="og"><p class="hint">No instructors found.</p></div>`;
  return `<div class="og"><label class="ol">Instructor</label>
    <select class="os" onchange="selectInst(+this.value)">
      ${instructors.map((inst,i)=>`<option value="${i}" ${S.instIdx===i?'selected':''}>${x(inst.name)} (${inst.grp})</option>`).join('')}
    </select></div>`;
}
function oPhoto(key, label, val) {
  return `<div class="og"><label class="ol">${label}</label>
    <button class="ppbtn" onclick="openModal('${key}')">
      ${val
        ? `<img class="ppthumb" src="${val}" alt="">`
        : `<div class="ppempty">🖼</div>`}
      <span>${val ? 'Change photo' : 'Choose photo…'}</span>
    </button></div>`;
}
function oPink() {
  return `<div class="og">
    <label class="ol">Pink Keywords</label>
    <input class="oi" value="${x(S.pinkWords)}" placeholder="e.g. habits, hormonal balance" oninput="set('pinkWords',this.value)">
    <p class="hint">Comma-separated — these words turn pink in the description</p>
  </div>`;
}

// ── State ────────────────────────────────────────────────
function set(k, v) { S[k] = v; updatePreview(); }

function selectEvent(idx) {
  S.eventIdx = idx;
  const e = events[idx]; if (!e) return;
  S.title = e.title||'';
  S.date  = e.date||'';
  S.time  = e.time||'';
  S.instructor = e.instructor||'';
  S.desc  = e.cardDescription||'';
  if (!S.photo && e.image) S.photo = e.image;
  if (e.image) S.nlEventPhoto = e.image;
  renderOpts(); updatePreview();
}

function selectInst(idx) {
  S.instIdx = idx;
  const inst = instructors[idx]; if (!inst) return;
  if (!S.instPhoto && inst.image) S.instPhoto = inst.image;
  renderOpts(); updatePreview();
}

function toggleMonthEv(idx, checked) {
  S.monthIdxs = checked
    ? [...new Set([...S.monthIdxs, idx])]
    : S.monthIdxs.filter(i=>i!==idx);
  updatePreview();
}

// ── Photo modal ──────────────────────────────────────────
let photoTarget = null;

function openModal(key) {
  photoTarget = key;
  document.getElementById('photo-modal').classList.add('open');
  pmTab('upload', document.querySelector('.pm-tab'));
}
function closeModal() {
  document.getElementById('photo-modal').classList.remove('open');
}
document.getElementById('photo-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('photo-modal')) closeModal();
});

function pmTab(id, btn) {
  document.querySelectorAll('.pm-tab').forEach((t,i)=>t.classList.toggle('active',(id==='upload'&&i===0)||(id==='site'&&i===1)));
  document.querySelectorAll('.pm-pane').forEach(p=>p.classList.remove('active'));
  document.getElementById('pm-'+id).classList.add('active');
}

function handleUpload(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => { S[photoTarget] = ev.target.result; renderOpts(); updatePreview(); closeModal(); };
  r.readAsDataURL(f);
}

function buildSiteGrid() {
  const g = document.getElementById('site-grid');
  if (!sitePhotos.length) { g.innerHTML = `<p style="font-size:13px;color:#aaa;grid-column:1/-1">No site photos found.</p>`; return; }
  g.innerHTML = sitePhotos.map(u =>
    `<img src="${u}" loading="lazy" onerror="this.style.display='none'" onclick="pickSitePhoto('${u}')">`
  ).join('');
}

function pickSitePhoto(url) {
  S[photoTarget] = url;
  renderOpts(); updatePreview(); closeModal();
}

// ── Utilities ────────────────────────────────────────────
function x(s) {  // html-escape for attributes/text
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function bg(url, pos) {
  return url
    ? `background:url('${url.replace(/'/g,"\\'")}') ${pos||'center'}/cover no-repeat`
    : `background:#d0ccc6`;
}
function ord(s) {  // superscript ordinal suffixes
  return String(s||'').replace(/(\d+)(st|nd|rd|th)\b/gi,'$1<sup style="font-size:.55em;vertical-align:super">$2</sup>');
}
function pink(text, words) {
  if (!words||!words.trim()) return text;
  let out = text;
  words.split(',').map(w=>w.trim()).filter(Boolean).forEach(w => {
    const safe = w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    out = out.replace(new RegExp(`(${safe})`,'gi'), `<span style="color:${PINK}">$1</span>`);
  });
  return out;
}
// Newsletter rich-text: split a textarea string into lines; a line starting
// with "-" or "•" becomes a bullet row. Preserves multi-line lists for cards.
function nlMultiline(text) {
  const lines = String(text||'').split(/\r?\n/).map(l=>l.replace(/\s+$/,'')).filter(l=>l.trim()!=='');
  if (!lines.length) return '';
  return lines.map(line => {
    const m = line.match(/^\s*[-•]\s*(.*)$/);
    if (m) {
      return `<div style="display:flex;gap:.5em;text-align:left;margin-bottom:.18em"><span style="flex-shrink:0">•</span><span>${x(m[1])}</span></div>`;
    }
    return `<div style="margin-bottom:.18em">${x(line.trim())}</div>`;
  }).join('');
}
// Date block: keeps the classic "Date · Time" on one line, but if the Date
// field has multiple lines (e.g. a list of master classes) renders them stacked.
function nlDateBlock() {
  const dateStr = String(S.date||'').trim();
  if (!/\r?\n/.test(dateStr)) {
    const one = x(dateStr) + (S.time ? (dateStr ? ' · ' : '') + x(S.time) : '');
    return one ? `<div>${one}</div>` : '';
  }
  return nlMultiline(dateStr) + (S.time ? `<div style="margin-top:.1em">${x(S.time)}</div>` : '');
}
// Manual text-scale chosen in the sidebar (no auto-shrink). 1 = default.
function nlScale() { return S.nlTextScale != null ? S.nlTextScale : 1; }
function nlText(text) { return nlMultiline(text) || `<span style="color:#ccc">Description…</span>`; }
// Manual card height (width stays 1200). Card also grows if content is taller.
function nlH() { return S.nlHeight != null ? S.nlHeight : 700; }

function inst() { return instructors[S.instIdx]||{}; }

// Sama logo/handle markup used in templates
function samyLogo(filter) {
  const f = filter||'none';
  return `<img src="${LOGO_URL}" style="height:54px;object-fit:contain;filter:${f}" alt="Sama Yoga Center" crossorigin="anonymous">`;
}
function samyHandle(col) {
  col = col||'#2d2d2d';
  return `<span style="font-family:'Montserrat',sans-serif;font-size:24px;font-weight:400;letter-spacing:.06em;color:${col}">@samayogacenter</span>`;
}

// Decorative brush-stroke SVG
function brush(style) {
  return `<svg style="position:absolute;pointer-events:none;${style||''}" viewBox="0 0 140 560" xmlns="http://www.w3.org/2000/svg">
    <path d="M70,10 C120,80 20,180 90,290 C150,380 25,460 80,550" stroke="rgba(55,42,30,.16)" stroke-width="28" fill="none" stroke-linecap="round"/>
    <path d="M45,0 C100,70 10,160 72,270 C130,360 18,440 65,540"   stroke="rgba(55,42,30,.09)" stroke-width="14" fill="none" stroke-linecap="round"/>
  </svg>`;

// ── Draggable boxes ───────────────────────────────────────
// Certain template boxes (behind-pose, teacher training) can be repositioned
// by dragging them in the preview. Mouse coords are converted to template
// space by dividing by the current scale factor.

let _drag = null;

function _getScale() {
  const tpl = TMPLS.find(t=>t.id===S.tpl)||TMPLS[0];
  const area = document.getElementById('preview-area');
  return Math.min((area.clientWidth-48)/tpl.w, (area.clientHeight-80)/tpl.h, 1);
}

document.getElementById('preview-wrap').addEventListener('mousedown', e => {
  const el = e.target.closest('[data-drag]');
  if (!el) return;
  _drag = {
    key:     el.dataset.drag,
    scale:   _getScale(),
    startX:  e.clientX,
    startY:  e.clientY,
    origLeft: parseFloat(el.style.left) || 0,
    origTop:  parseFloat(el.style.top)  || 0,
  };
  el.style.cursor = 'grabbing';
  e.preventDefault();
});
document.addEventListener('mousemove', e => {
  if (!_drag) return;
  const newLeft = _drag.origLeft + (e.clientX - _drag.startX) / _drag.scale;
  const newTop  = _drag.origTop  + (e.clientY - _drag.startY) / _drag.scale;
  S[_drag.key + 'Left'] = newLeft;
  S[_drag.key + 'Top']  = newTop;
  const el = document.querySelector(`[data-drag="${_drag.key}"]`);
  if (el) { el.style.left = newLeft+'px'; el.style.top = newTop+'px'; }
});
document.addEventListener('mouseup', () => {
  if (_drag) {
    const el = document.querySelector(`[data-drag="${_drag.key}"]`);
    if (el) el.style.cursor = 'grab';
    _drag = null;
  }
});

// ── Animation helpers ─────────────────────────────────────
// animT: undefined = live CSS animation; 'static' = no anim (PNG export); number = computed frame (video)

/** Returns style string for text float-in effect. */
function animFi(animT, delay, dur) {
  dur = dur || 0.9;
  if (animT === undefined) return `animation:floatIn ${dur}s ${delay}s ease both`;
  if (animT === 'static')  return 'opacity:1;transform:none';
  const p = Math.min(1, Math.max(0, (animT - delay) / dur));
  const y  = (26 * (1 - p)).toFixed(1);
  return `opacity:${p.toFixed(3)};transform:translateY(${y}px)`;
}

/** Style string for photo slot 1 (shows first 5 s, fades out). */
function animP1(animT) {
  if (animT === undefined) return 'animation:photo1Fade 10s linear both';
  if (animT === 'static')  return 'opacity:1';
  const o = animT < 4.5 ? 1 : animT > 5.5 ? 0 : +(1 - (animT - 4.5)).toFixed(3);
  return `opacity:${o}`;
}

/** Style string for photo slot 2 (fades in at 5 s). */
function animP2(animT) {
  if (animT === undefined) return 'animation:photo2Fade 10s linear both';
  if (animT === 'static')  return 'opacity:0';
  const o = animT < 4.5 ? 0 : animT > 5.5 ? 1 : +((animT - 4.5)).toFixed(3);
  return `opacity:${o}`;
}

// ── Preview ──────────────────────────────────────────────
function updatePreview() {
  document.getElementById('tpl-full').innerHTML = render();
  scalePreview();
}

function scalePreview() {
  const t   = TMPLS.find(t=>t.id===S.tpl)||TMPLS[0];
  const area = document.getElementById('preview-area');
  const wrap = document.getElementById('preview-wrap');
  const full = document.getElementById('tpl-full');
  // Width is fixed by the template; height may grow (e.g. taller newsletter cards),
  // so measure the actual rendered height rather than assuming t.h.
  full.style.width  = t.w + 'px';
  full.style.height = 'auto';
  full.style.transform = 'none';
  const inner = full.firstElementChild;
  const realH = inner ? inner.offsetHeight : t.h;
  const maxW = area.clientWidth  - 48;
  const maxH = area.clientHeight - 80;
  const scale = Math.min(maxW/t.w, maxH/realH, 1);
  full.style.height = realH + 'px';
  full.style.transform = `scale(${scale})`;
  wrap.style.width  = Math.round(t.w * scale) + 'px';
  wrap.style.height = Math.round(realH * scale) + 'px';
}
window.addEventListener('resize', scalePreview);

// ── Template dispatcher ──────────────────────────────────
function render(animT) {
  switch (S.tpl) {
    case 'event-post':    return tEventPost(animT);
    case 'event-story':   return tEventStory(animT);
    case 'event-card':    return tEventCard(animT);
    case 'monthly':       return tMonthly();
    case 'monthly-story': return tMonthlyStory();
    case 'get-to-know':   return tGetToKnow();
    case 'meet':          return tMeet();
    case 'tips':          return tTips();
    case 'behind-pose':   return tBehindPose();
    case 'testimonial':   return tTestimonial();
    case 'ytt-cover':     return tYttCover();
    case 'nl-cover':       return tNlCover();
    case 'nl-event-pink':  return tNlEventPink();
    case 'nl-event-white': return tNlEventWhite();
    case 'nl-event-photo':  return tNlEventPhoto();
    default: return '';
  }
}

// ── Download Video (10-second MP4) ───────────────────────
// Priority: 1) MediaRecorder+MP4 (Chrome 130+/macOS)
//           2) WebCodecs + mp4-muxer → H.264 MP4 (Chrome 94+)
//           3) WebM fallback
async function downloadVideo() {
  const tplDef = TMPLS.find(t=>t.id===S.tpl)||TMPLS[0];
  const FPS = 10, DURATION = 10, total = FPS * DURATION;

  const vidBtn = document.getElementById('vid-btn');
  vidBtn.disabled = true;

  const canvas = document.createElement('canvas');
  canvas.width = tplDef.w; canvas.height = tplDef.h;
  const ctx = canvas.getContext('2d');

  const wrap = document.createElement('div');
  wrap.style.cssText = `position:fixed;left:${-(tplDef.w+200)}px;top:0;width:${tplDef.w}px;height:${tplDef.h}px;overflow:hidden`;
  document.body.appendChild(wrap);
  await document.fonts.ready;
  await new Promise(r => setTimeout(r, 200));

  const frames = [];
  try {
    // ── Phase 1: render every frame ──────────────────────
    for (let f = 0; f <= total; f++) {
      wrap.innerHTML = render((f / total) * DURATION);
      await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
      frames.push(await html2canvas(wrap, {
        scale: 1, useCORS: true, allowTaint: false,
        width: tplDef.w, height: tplDef.h, logging: false,
      }));
      if (f % 4 === 0) vidBtn.textContent = `Rendering… ${Math.round((f/total)*100)}%`;
    }
    document.body.removeChild(wrap);

    // ── Phase 2: encode ───────────────────────────────────
    let blob, ext;

    // Try 1 — MediaRecorder native MP4 (Chrome 130+ / macOS)
    const nativeMp4 = ['video/mp4;codecs=avc1', 'video/mp4']
      .find(m => MediaRecorder.isTypeSupported(m));
    if (nativeMp4) {
      vidBtn.textContent = 'Encoding MP4…';
      blob = await _mrBlob(frames, canvas, ctx, FPS, nativeMp4);
      ext  = 'mp4';

    // Try 2 — WebCodecs + mp4-muxer → H.264 MP4 (Chrome 94+)
    } else if (window.VideoEncoder) {
      vidBtn.textContent = 'Encoding MP4…';
      try {
        blob = await _wcBlob(frames, tplDef, FPS, vidBtn);
        ext  = 'mp4';
      } catch (e2) {
        console.warn('WebCodecs failed, using WebM fallback:', e2);
        blob = await _mrBlob(frames, canvas, ctx, FPS,
          MediaRecorder.isTypeSupported('video/webm;codecs=vp9') ? 'video/webm;codecs=vp9' : 'video/webm');
        ext  = 'webm';
      }

    // Fallback — WebM
    } else {
      vidBtn.textContent = 'Encoding…';
      blob = await _mrBlob(frames, canvas, ctx, FPS,
        MediaRecorder.isTypeSupported('video/webm;codecs=vp9') ? 'video/webm;codecs=vp9' : 'video/webm');
      ext  = 'webm';
    }

    const a = Object.assign(document.createElement('a'), {
      download: `sama-${S.tpl}-${Date.now()}.${ext}`,
      href:     URL.createObjectURL(blob),
    });
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 8000);

  } catch (err) {
    if (document.body.contains(wrap)) document.body.removeChild(wrap);
    alert('Video export failed: ' + err.message);
    console.error(err);
  }
  vidBtn.disabled = false;
  vidBtn.textContent = '▶  Download Video (10s)';
}

// ── MediaRecorder encode helper ───────────────────────────
// Uses captureStream(FPS) so the browser captures at the correct frame rate.
// Frames are drawn at the right interval; a short tail delay flushes the last chunk.
function _mrBlob(frames, canvas, ctx, FPS, mimeType) {
  return new Promise((resolve, reject) => {
    const stream   = canvas.captureStream(FPS);
    const recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 8_000_000 });
    const chunks   = [];
    recorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
    recorder.onerror = e => reject(e.error || new Error('MediaRecorder error'));
    recorder.start(100);   // collect data every 100 ms for reliable chunking
    let idx = 0;
    const ms = Math.round(1000 / FPS);
    const iv = setInterval(() => {
      if (idx < frames.length) {
        ctx.drawImage(frames[idx++], 0, 0);
      } else {
        clearInterval(iv);
        setTimeout(() => recorder.stop(), ms * 3);  // let last frames flush
      }
    }, ms);
    recorder.onstop = () => resolve(new Blob(chunks, { type: mimeType }));
  });
}

// ── WebCodecs + mp4-muxer encode helper → H.264 MP4 ──────
async function _wcBlob(frames, tplDef, FPS, vidBtn) {
  // Loaded on demand — no extra cost at page load
  const { Muxer, ArrayBufferTarget } =
    await import('https://cdn.jsdelivr.net/npm/mp4-muxer/+esm');

  const target = new ArrayBufferTarget();
  const muxer  = new Muxer({
    target,
    video: { codec: 'avc', width: tplDef.w, height: tplDef.h },
    fastStart: 'in-memory',
  });

  // Pick best supported H.264 profile: High → Main → Baseline
  let codecStr;
  for (const c of ['avc1.640028', 'avc1.4d0028', 'avc1.42001f']) {
    try {
      const cfg = { codec: c, width: tplDef.w, height: tplDef.h, bitrate: 8_000_000, framerate: FPS };
      if ((await VideoEncoder.isConfigSupported(cfg)).supported) { codecStr = c; break; }
    } catch (_) {}
  }
  if (!codecStr) throw new Error('No H.264 codec available in this browser');

  const encoder = new VideoEncoder({
    output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
    error:  e => { throw e; },
  });
  encoder.configure({ codec: codecStr, width: tplDef.w, height: tplDef.h, bitrate: 8_000_000, framerate: FPS });

  for (let i = 0; i < frames.length; i++) {
    if (i % 5 === 0) vidBtn.textContent = `Encoding… ${Math.round((i / frames.length) * 100)}%`;
    const bm = await createImageBitmap(frames[i]);
    const vf = new VideoFrame(bm, { timestamp: Math.round(i * 1_000_000 / FPS), duration: Math.round(1_000_000 / FPS) });
    encoder.encode(vf, { keyFrame: i % (FPS * 2) === 0 });
    vf.close(); bm.close();
  }
  await encoder.flush();
  encoder.close();
  muxer.finalize();
  return new Blob([target.buffer], { type: 'video/mp4' });
}

}

// ── Post types (colors match examples) ───────────────
const PTYPES = {
  story:    { label:'Static Story',  bg:'#b8eef5', color:'#0d3240' },
  vstory:   { label:'Video Story',   bg:'#ead6f5', color:'#320d40' },

};

const CAL_MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const CAL_DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

// ── Mode switching ────────────────────────────────────
function setMode(mode) {
  const isCal = (mode === 'calendar');
  ['tpl-section','nl-section','options'].forEach(id => {
    document.getElementById(id).style.display = isCal ? 'none' : '';
  });
  document.getElementById('cal-controls').style.display  = isCal ? 'flex' : 'none';
  document.getElementById('preview-wrap').style.display  = isCal ? 'none' : '';
  document.getElementById('dl-bar').style.display        = isCal ? 'none' : '';
  document.getElementById('cal-area').style.display      = isCal ? 'flex' : 'none';
  document.getElementById('tab-studio').classList.toggle('active',   !isCal);
  document.getElementById('tab-calendar').classList.toggle('active',  isCal);
  if (isCal) updateCalendar();
}

function updateCalendar() {
  const m = parseInt(document.getElementById('cal-month-sel').value  || 0);
  const y = parseInt(document.getElementById('cal-year-inp').value   || 2026);
  if (!isNaN(m) && !isNaN(y)) renderCalendar(y, m);
}

// ── Date helpers ──────────────────────────────────────
function daysInMonth(y, m) { return new Date(y, m + 1, 0).getDate(); }

// Returns the day-of-month (1-based) for the n-th occurrence (1=first) of weekday in month
function nthWeekday(y, m, wd, n) {
  let count = 0;
  for (let d = 1, dim = daysInMonth(y, m); d <= dim; d++) {
    if (new Date(y, m, d).getDay() === wd) { if (++count === n) return d; }
  }
  return null;
}

// Returns nearest weekday (Mon-Fri) at or after given day (clamped to month)
function toWeekday(y, m, day) {
  const dim = daysInMonth(y, m);
  for (let d = Math.max(1, day); d <= dim; d++) {
    const wd = new Date(y, m, d).getDay();
    if (wd > 0 && wd < 6) return d;
  }
  return null;
}

// Parse "Saturday, June 14th, 2026" → { year, month (0-based), day } or null
function parseEventDate(str) {
  if (!str) return null;
  const m = str.match(/(\w+)\s+(\d+)(?:st|nd|rd|th)?,\s+(\d{4})/);
  if (!m) {
    // fallback: "June 14th"
    const m2 = str.match(/(\w+)\s+(\d+)/);
    if (!m2) return null;
    const mo = CAL_MONTHS.findIndex(n => n.toLowerCase() === m2[1].toLowerCase());
    return mo === -1 ? null : { year: null, month: mo, day: parseInt(m2[2]) };
  }
  const mo = CAL_MONTHS.findIndex(n => n.toLowerCase() === m[1].toLowerCase());
  if (mo === -1) return null;
  return { year: parseInt(m[3]), month: mo, day: parseInt(m[2]) };
}

// Get events that fall in a specific year+month
function eventsInMonth(y, m) {
  return events.map(e => {
    const pd = parseEventDate(e.date);
    if (!pd) return null;
    if (pd.month !== m) return null;
    if (pd.year && pd.year !== y) return null;
    return { ...e, _day: pd.day };
  }).filter(Boolean).sort((a, b) => a._day - b._day);
}

// ── Custom key dates (user-entered per month) ────────
// Stored as "YYYY-M" → [{name, day, id}]
const calCustomEvents = {};
function calKey(y, m) { return y + '-' + m; }

function addCalCustomEvent() {
  const nameEl = document.getElementById('cal-custom-name');
  const dayEl  = document.getElementById('cal-custom-day');
  const name   = nameEl.value.trim();
  const day    = parseInt(dayEl.value);
  if (!name || isNaN(day) || day < 1 || day > 31) {
    nameEl.focus(); return;
  }
  const y = parseInt(document.getElementById('cal-year-inp').value);
  const m = parseInt(document.getElementById('cal-month-sel').value);
  const k = calKey(y, m);
  calCustomEvents[k] = calCustomEvents[k] || [];
  calCustomEvents[k].push({ name, day, id: Date.now() });
  nameEl.value = ''; dayEl.value = '';
  updateCalendar();
}

function removeCalCustomEvent(k, id) {
  if (calCustomEvents[k])
    calCustomEvents[k] = calCustomEvents[k].filter(e => e.id !== id);
  updateCalendar();
}

// ── Schedule generator ────────────────────────────────
function generateSchedule(y, m) {
  const out = {};   // day → [{text, type}]
  const dim = daysInMonth(y, m);
  const add = (day, text, type) => {
    day = Math.round(day);
    if (!day || day < 1 || day > dim) return;
    (out[day] = out[day] || []).push({ text, type });
  };

  const monthName = CAL_MONTHS[m];
  const instrName = instructors.length
    ? instructors[(m + y) % instructors.length].name.split(' ')[0]
    : 'Teacher';

  // ── Recurring content ──────────────────────────────
  // Rebekah monthly reel — always day 1 of the month
  add(1, `Rebekah ${monthName} Reel`, 'reel');

  // Rebekah's Tips — first Wed
  const fWed = nthWeekday(y, m, 3, 1);
  if (fWed) add(fWed, "Rebekah's Tips", 'carousel');

  // Students/studio — 3rd Mon
  const sMon3 = nthWeekday(y, m, 1, 3);
  if (sMon3) add(sMon3, 'Students/studio', 'carousel');

  // Pose highlight — 3rd Wed
  const sWed3 = nthWeekday(y, m, 3, 3);
  if (sWed3) add(sWed3, 'Pose highlight connecting to theme', 'carousel');

  // Teacher Q&A — 2nd Tue
  const sTue2 = nthWeekday(y, m, 2, 2);
  if (sTue2) add(sTue2, instrName + ' Q&A', 'carousel');

  // Second Rebekah reel — 4th Mon (mid-month casual)
  const sMon4 = nthWeekday(y, m, 1, 4);
  if (sMon4) {
    const midLabels = [
      'Rebekah Q&A Reel',
      'Founder Series Reel',
      'Behind-the-Scenes Reel',
      'Monthly Theme Reel',
    ];
    add(sMon4, midLabels[m % midLabels.length], 'reel');
  }

  // ── Events this month ──────────────────────────────
  const thisMonth = eventsInMonth(y, m);
  thisMonth.forEach(ev => {
    const ed   = ev._day;
    // Announcement: ~10 days before (weekday)
    const aDayRaw = ed - 10;
    if (aDayRaw >= 1) {
      const aDay = toWeekday(y, m, aDayRaw);
      if (aDay) add(aDay, ev.title, 'carousel');
    }

    // "This weekend" / reminder: 2 days before (or Fri if event on Sat/Sun)
    const ewd = new Date(y, m, ed).getDay();
    const remDay = (ewd === 6) ? ed - 1 : (ewd === 0) ? ed - 2 : ed - 2;
    if (remDay >= 1 && remDay < ed) {
      const rLabel = (ed - remDay === 1) ? ev.title + ' tomorrow' : ev.title + ' this weekend';
      add(remDay, rLabel, 'story');
    }
  });

  // ── Next month's events (teasers in last week) ──────
  const nm = (m + 1) % 12;
  const ny = m === 11 ? y + 1 : y;
  const nextMonth = eventsInMonth(ny, nm);
  // Find last Fri of current month
  let lastFri = null;
  for (let d = dim; d >= 1; d--) { if (new Date(y, m, d).getDay() === 5) { lastFri = d; break; } }
  const teaseCandidates = nextMonth.filter(ev => ev._day <= 18);
  teaseCandidates.slice(0, 2).forEach((ev, i) => {
    const tDay = lastFri ? lastFri - i * 3 : dim - i * 3;
    add(tDay, `${ev.title} — ${nm + 1}/${ev._day}`, 'reel');
  });

  // January special
  if (m === 0) add(1, 'Happy New Year from Sama', 'carousel');

  // ── Custom key dates added by user ─────────────────
  const customEvs = calCustomEvents[calKey(y, m)] || [];
  customEvs.forEach(ev => {
    const ed = Math.min(ev.day, dim);
    // Announcement ~10 days before
    const aDayRaw = ed - 10;
    if (aDayRaw >= 1) {
      const aDay = toWeekday(y, m, aDayRaw);
      if (aDay) add(aDay, ev.name, 'carousel');
    }
    // Reminder 2 days before
    const ewd = new Date(y, m, ed).getDay();
    const remDay = (ewd === 6) ? ed - 1 : ed - 2;
    if (remDay >= 1 && remDay < ed) {
      const rLabel = (ed - remDay === 1) ? ev.name + ' tomorrow' : ev.name + ' this weekend';
      add(remDay, rLabel, 'story');
    }
  });

  return out;
}

// ── Calendar renderer ─────────────────────────────────
function renderCalendar(y, m) {
  const schedule  = generateSchedule(y, m);
  const thisMonthEvs = eventsInMonth(y, m);
  const dim       = daysInMonth(y, m);
  const firstWd   = new Date(y, m, 1).getDay();      // weekday of day-1
  const prevDim   = daysInMonth(m === 0 ? y - 1 : y, m === 0 ? 11 : m - 1);
  const totalCells= Math.ceil((firstWd + dim) / 7) * 7;

  // ── Header ────────────────────────────────────────
  document.getElementById('cal-hdr-m').textContent = CAL_MONTHS[m];
  document.getElementById('cal-hdr-y').textContent = y;

  // ── Left column ───────────────────────────────────
  const keyRows = thisMonthEvs.length
    ? thisMonthEvs.map(ev => `<div class="cal-left-event"><strong>${CAL_MONTHS[m].slice(0,3)} ${ev._day}:</strong> ${ev.title}${ev.time ? '<br><span style="color:#888">' + ev.time + '</span>' : ''}</div>`).join('')
    : '<div class="cal-left-event" style="color:#bbb">No events this month</div>';

  const legendRows = Object.entries(PTYPES).map(([k, v]) =>
    `<div class="cal-legend-chip" style="background:${v.bg};color:${v.color}">${v.label}</div>`
  ).join('');

  document.getElementById('cal-left-col').innerHTML = `
    <div class="cal-left-heading">Key Dates/Events</div>
    ${keyRows}
    <hr class="cal-left-divider">
    <div class="cal-platform-label">Platform</div>
    ${legendRows}
  `;

  // ── Sidebar key dates panel ──────────────────────────
  const customs = calCustomEvents[calKey(y, m)] || [];
  // Render custom events list
  document.getElementById('cal-custom-list').innerHTML = customs.length
    ? customs.map(ev =>
        `<div class="cal-custom-item">
           <span class="cal-custom-item-day">${ev.day}</span>
           <span class="cal-custom-item-text">${ev.name}</span>
           <button class="cal-custom-del" onclick="removeCalCustomEvent('${calKey(y,m)}',${ev.id})" title="Remove">✕</button>
         </div>`
      ).join('')
    : '<div style="font-size:10.5px;color:#ccc;margin-bottom:4px">None added yet</div>';

  // Build combined key-dates list (website events + custom)
  const allKeyDates = [
    ...thisMonthEvs.map(ev => ({ day: ev._day, text: ev.title, sub: ev.time || '' })),
    ...customs.map(ev => ({ day: ev.day, text: ev.name, sub: '' })),
  ].sort((a, b) => a.day - b.day);

  document.getElementById('cal-key-sidebar').innerHTML = `
    <span class="cal-sb-heading">Key Dates/Events</span>
    ${allKeyDates.length
      ? allKeyDates.map(kd => `<div class="cal-sb-event">
          <strong>${CAL_MONTHS[m].slice(0,3)} ${kd.day}:</strong> ${kd.text}
          ${kd.sub ? '<br><span style="color:#aaa">'+kd.sub+'</span>' : ''}
        </div>`).join('')
      : '<div class="cal-sb-event" style="color:#bbb">No events this month</div>'}
    <div class="cal-sb-legend">
      <span class="cal-sb-heading">Platform</span>
      ${Object.entries(PTYPES).map(([k,v]) =>
        `<span class="cal-sb-chip" style="background:${v.bg};color:${v.color}">${v.label}</span>`
      ).join('')}
    </div>
  `;

  // ── Grid ──────────────────────────────────────────
  const colHeaders = CAL_DAYS.map(d =>
    `<div class="cal-col-hdr">${d}</div>`
  ).join('');

  let cells = '';
  // Prev-month filler
  for (let i = 0; i < firstWd; i++) {
    const d = prevDim - (firstWd - 1 - i);
    cells += `<div class="cal-cell"><span class="cal-cell-num dim">${d}</span></div>`;
  }
  // This month
  for (let d = 1; d <= dim; d++) {
    const posts = schedule[d] || [];
    const chips = posts.map(p => {
      const t = PTYPES[p.type];
      return `<span class="cal-chip" style="background:${t.bg};color:${t.color}">${p.text}</span>`;
    }).join('');
    cells += `<div class="cal-cell"><span class="cal-cell-num">${d}</span>${chips}</div>`;
  }
  // Next-month filler
  let nd = 1;
  for (let i = firstWd + dim; i < totalCells; i++, nd++) {
    cells += `<div class="cal-cell"><span class="cal-cell-num dim">${nd}</span></div>`;
  }

  document.getElementById('cal-grid').innerHTML = colHeaders + cells;
}

// ── Calendar PNG download ─────────────────────────────
async function downloadCalendar() {
  const btn = event.target;
  btn.disabled = true; btn.textContent = 'Generating…';
  try {
    const node = document.getElementById('cal-canvas');
    const canvas = await html2canvas(node, {
      scale: 2, useCORS: true, allowTaint: false, logging: false,
      backgroundColor: '#ffffff',
    });
    const a = document.createElement('a');
    a.download = `sama-calendar-${document.getElementById('cal-hdr-m').textContent}-${document.getElementById('cal-hdr-y').textContent}.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
  } catch (err) { alert('Download failed: ' + err.message); }
  btn.disabled = false; btn.textContent = '⬇\xa0 Download Calendar PNG';
}

// Initialise month selector to current month
(function initCalSelector() {
  const sel = document.getElementById('cal-month-sel');
  if (sel) sel.value = new Date().getMonth();
  const yInp = document.getElementById('cal-year-inp');
  if (yInp) yInp.value = new Date().getFullYear();
})();

</script>
