<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sama Social Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Dancing+Script:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&family=Nunito:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" crossorigin="anonymous"></script>

  <style>
  /* ── Reset ───────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── Tool UI ─────────────────────────────────────────── */
  body {
    font-family: 'Nunito', sans-serif;
    background: #f0ede8;
    color: #2d2d2d;
    height: 100vh;
    overflow: hidden;
  }

  /* Lock Screen */
  #lock {
    position: fixed; inset: 0;
    background: #ece8e2;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 18px; z-index: 1000;
  }
  #lock-logo { height: 54px; object-fit: contain; }
  #lock h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px; font-weight: 400;
    letter-spacing: .06em; color: #2d2d2d;
  }
  #lock-sub {
    font-family: 'Montserrat', sans-serif;
    font-size: 10px; letter-spacing: .18em;
    text-transform: uppercase; color: #bbb;
  }
  .lock-row { display: flex; gap: 8px; margin-top: 6px; }
  #lock-pw {
    padding: 10px 16px;
    border: 1px solid #ccc; border-radius: 4px;
    font-family: 'Nunito', sans-serif; font-size: 15px;
    background: white; outline: none; width: 180px;
  }
  #lock-pw:focus { border-color: #b03060; }
  #lock-err { color: #b03060; font-size: 12px; height: 16px; }

  /* Buttons */
  .btn-pink {
    background: #b03060; color: white; border: none;
    padding: 10px 22px; border-radius: 4px;
    font-family: 'Montserrat', sans-serif;
    font-size: 12px; font-weight: 700;
    letter-spacing: .08em; cursor: pointer;
  }
  .btn-pink:hover { background: #932852; }
  .btn-pink:disabled { background: #ccc; cursor: default; }

  /* Studio */
  #studio { display: none; height: 100vh; }
  #studio.on { display: flex; }

  /* ── Sidebar ─────────────────────────────────────────── */
  #sidebar {
    width: 380px; min-width: 380px;
    background: white; border-right: 1px solid #e0dbd4;
    display: flex; flex-direction: column; overflow: hidden;
  }
  /* Template pickers share a capped, scrollable region so the edit fields
     (#options) always keep the majority of the sidebar height. */
  #picker-wrap { flex: 0 1 auto; overflow-y: auto; max-height: 40vh; }
  #sb-head {
    padding: 14px 18px 12px;
    border-bottom: 1px solid #eee;
    flex-shrink: 0;
  }
  #sb-head img { height: 28px; }
  #sb-head span {
    display: block;
    font-family: 'Montserrat', sans-serif;
    font-size: 9px; font-weight: 700;
    letter-spacing: .18em; color: #bbb;
    text-transform: uppercase; margin-top: 5px;
  }
  #tpl-section { padding: 12px 14px 8px; border-bottom: 1px solid #eee; flex-shrink: 0; }
  #tpl-section > label {
    font-family: 'Montserrat', sans-serif;
    font-size: 9px; font-weight: 700;
    letter-spacing: .15em; color: #bbb;
    text-transform: uppercase; display: block; margin-bottom: 8px;
  }
  .tpl-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
  .tpl-btn {
    background: #f7f5f2; border: 1.5px solid transparent;
    border-radius: 6px; padding: 7px 4px 6px;
    cursor: pointer; text-align: center;
    font-family: 'Nunito', sans-serif;
    font-size: 10px; color: #777; line-height: 1.3;
    transition: all .15s;
  }
  .tpl-btn .ico { font-size: 16px; display: block; margin-bottom: 2px; }
  .tpl-btn:hover { border-color: #d0a0b5; }
  .tpl-btn.active { border-color: #b03060; background: #fdf0f5; color: #b03060; font-weight: 700; }

  /* Options panel */
  #options { flex: 1; overflow-y: auto; padding: 14px; }
  .og { margin-bottom: 14px; }
  .ol {
    font-family: 'Montserrat', sans-serif;
    font-size: 9px; font-weight: 700;
    letter-spacing: .12em; color: #bbb;
    text-transform: uppercase; display: block; margin-bottom: 5px;
  }
  .oi, .os, .ota {
    width: 100%; padding: 7px 10px;
    border: 1px solid #ddd; border-radius: 4px;
    font-family: 'Nunito', sans-serif;
    font-size: 13px; background: white;
    color: #2d2d2d; outline: none;
  }
  .oi:focus, .os:focus, .ota:focus { border-color: #b03060; }
  .ota { resize: vertical; min-height: 64px; line-height: 1.5; }
  .hint { font-size: 11px; color: #bbb; margin-top: 4px; }
  .odiv { border: none; border-top: 1px solid #eee; margin: 12px 0; }
  .oradio { display: flex; gap: 10px; }
  .oradio label {
    display: flex; align-items: center; gap: 5px;
    font-size: 13px; cursor: pointer;
  }

  /* Photo picker button */
  .ppbtn {
    width: 100%; padding: 7px 10px;
    border: 1.5px dashed #ccc; border-radius: 5px;
    background: #fafafa; cursor: pointer;
    display: flex; align-items: center; gap: 9px;
    font-family: 'Nunito', sans-serif;
    font-size: 12px; color: #999; transition: border-color .15s;
  }
  .ppbtn:hover { border-color: #b03060; }
  .ppthumb { width: 40px; height: 40px; object-fit: cover; border-radius: 3px; flex-shrink: 0; }
  .ppempty {
    width: 40px; height: 40px; background: #eee;
    border-radius: 3px; display: flex;
    align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }

  /* ── Preview Area ────────────────────────────────────── */
  #preview-area {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px; gap: 18px; overflow: hidden;
  }
  #preview-wrap {
    position: relative;
    box-shadow: 0 8px 40px rgba(0,0,0,.18);
    border-radius: 2px; overflow: hidden;
    background: #ccc; flex-shrink: 0;
  }
  #tpl-full { transform-origin: top left; width: 1080px; position: relative; }
  #dl-bar { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
  #dl-btn {
    background: #b03060; color: white; border: none;
    padding: 11px 28px; border-radius: 4px;
    font-family: 'Montserrat', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: .1em; cursor: pointer; text-transform: uppercase;
  }
  #dl-btn:hover { background: #932852; }
  #dl-btn:disabled { background: #ccc; cursor: default; }
  #dl-info {
    font-family: 'Montserrat', sans-serif;
    font-size: 10px; letter-spacing: .08em;
    color: #bbb; text-transform: uppercase;
  }

  /* ── Photo Modal ─────────────────────────────────────── */
  #photo-modal {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.55);
    z-index: 600; display: none;
    align-items: center; justify-content: center;
  }
  #photo-modal.open { display: flex; }
  #pm-inner {
    background: white; border-radius: 8px;
    width: 580px; max-height: 78vh;
    display: flex; flex-direction: column; overflow: hidden;
  }
  #pm-hdr {
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 14px 20px; border-bottom: 1px solid #eee;
  }
  #pm-hdr h3 {
    font-family: 'Montserrat', sans-serif;
    font-size: 12px; font-weight: 700;
    letter-spacing: .1em; text-transform: uppercase;
  }
  #pm-close {
    background: none; border: none;
    font-size: 20px; cursor: pointer; color: #888;
  }
  .pm-tabs { display: flex; border-bottom: 1px solid #eee; }
  .pm-tab {
    padding: 9px 20px; background: none; border: none;
    border-bottom: 2px solid transparent;
    font-family: 'Nunito', sans-serif;
    font-size: 13px; cursor: pointer; color: #999;
  }
  .pm-tab.active { color: #b03060; border-bottom-color: #b03060; font-weight: 700; }
  #pm-body { flex: 1; overflow-y: auto; padding: 16px; }
  .pm-pane { display: none; }
  .pm-pane.active { display: block; }
  #upload-zone {
    border: 2px dashed #ddd; border-radius: 8px;
    padding: 36px; text-align: center; cursor: pointer;
  }
  #upload-zone:hover { border-color: #b03060; }
  #upload-zone input { display: none; }
  .uz-ico { font-size: 36px; color: #ccc; }
  #upload-zone p { font-size: 13px; color: #aaa; margin-top: 8px; }
  .photos-grid {
    display: grid; grid-template-columns: repeat(4,1fr); gap: 7px;
  }
  .photos-grid img {
    width: 100%; aspect-ratio: 1; object-fit: cover;
    border-radius: 4px; cursor: pointer;
    border: 2px solid transparent; transition: border-color .15s;
  }
  .photos-grid img:hover { border-color: #b03060; }


  /* ── Mode Tabs (Studio / Calendar) ──────────────────── */
  #mode-tabs {
    display: flex; flex-shrink: 0;
    border-bottom: 1px solid #eee;
  }
  .mode-tab {
    flex: 1; padding: 9px 6px; border: none;
    background: none; cursor: pointer;
    font-family: 'Montserrat', sans-serif;
    font-size: 10px; font-weight: 700;
    letter-spacing: .10em; text-transform: uppercase;
    color: #bbb; transition: color .15s;
    border-bottom: 2px solid transparent;
  }
  .mode-tab:hover { color: #b03060; }
  .mode-tab.active { color: #b03060; border-bottom-color: #b03060; }

  /* ── Calendar sidebar ────────────────────────────────── */
  #cal-controls {
    display: none; flex-direction: column;
    flex: 1; overflow: hidden;
  }
  #cal-picker {
    padding: 10px 14px 8px; border-bottom: 1px solid #eee; flex-shrink: 0;
    display: flex; gap: 7px; align-items: flex-end;
  }
  #cal-picker .og { margin-bottom: 0; flex: 1; }
  #cal-picker .og:last-child { flex: 0 0 70px; }
  #cal-key-sidebar {
    flex: 1; overflow-y: auto; padding: 14px 14px 10px;
    font-family: 'Nunito', sans-serif; font-size: 11.5px;
  }
  .cal-sb-heading {
    font-family: 'Montserrat', sans-serif;
    font-size: 9px; font-weight: 700;
    letter-spacing: .15em; text-transform: uppercase;
    color: #bbb; margin-bottom: 8px; display: block;
  }
  .cal-sb-event {
    color: #444; margin-bottom: 7px; line-height: 1.35;
  }
  .cal-sb-legend {
    margin-top: 16px;
  }
  .cal-custom-item {
    display: flex; align-items: flex-start; gap: 6px;
    margin-bottom: 5px; font-size: 11px;
  }
  .cal-custom-item-text {
    flex: 1; color: #333; line-height: 1.35;
  }
  .cal-custom-item-day {
    font-family: 'Montserrat', sans-serif;
    font-size: 10px; font-weight: 700;
    color: #b03060; white-space: nowrap; flex-shrink: 0;
    padding-top: 1px;
  }
  .cal-custom-del {
    background: none; border: none; color: #ccc;
    cursor: pointer; font-size: 13px; line-height: 1;
    padding: 0; flex-shrink: 0;
  }
  .cal-custom-del:hover { color: #b03060; }

  .cal-sb-chip {
    display: inline-block; padding: 3px 10px;
    border-radius: 4px; font-size: 10px; font-weight: 700;
    margin: 2px 2px 0 0;
  }

  /* ── Calendar main area ──────────────────────────────── */
  #cal-area {
    display: none; flex: 1; overflow: auto;
    padding: 28px 32px 24px;
    background: #f7f5f2;
    flex-direction: column;
  }
  #cal-canvas {
    background: white; border-radius: 12px;
    padding: 30px 32px 28px;
    box-shadow: 0 2px 18px rgba(0,0,0,.07);
    min-width: 800px;
  }
  .cal-hdr {
    display: flex; align-items: baseline;
    gap: 18px; margin-bottom: 22px; flex-wrap: wrap;
  }
  .cal-hdr-month {
    font-family: 'Nunito', sans-serif;
    font-size: 52px; font-weight: 900;
    color: #0d1a3e; line-height: 1; flex-shrink: 0;
  }
  .cal-hdr-year {
    font-family: 'Montserrat', sans-serif;
    font-size: 26px; font-weight: 300;
    color: #0d1a3e; flex-shrink: 0;
  }
  .cal-hdr-brand {
    margin-left: auto;
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px; font-weight: 400;
    color: #0d1a3e; white-space: nowrap;
  }
  .cal-body-wrap {
    display: flex; gap: 20px;
  }
  .cal-left {
    width: 170px; flex-shrink: 0;
  }
  .cal-left-heading {
    font-family: 'Nunito', sans-serif;
    font-size: 12px; font-weight: 800;
    color: #0d1a3e; margin-bottom: 10px;
  }
  .cal-left-divider {
    border: none; border-top: 1px solid #ddd; margin: 12px 0;
  }
  .cal-left-event {
    font-family: 'Nunito', sans-serif;
    font-size: 11px; color: #444;
    margin-bottom: 8px; line-height: 1.38;
  }
  .cal-platform-label {
    font-family: 'Nunito', sans-serif;
    font-size: 14px; font-weight: 800;
    color: #0d1a3e; margin-bottom: 10px;
  }
  .cal-legend-chip {
    display: block; padding: 4px 10px;
    border-radius: 4px; font-size: 10.5px;
    font-weight: 700; margin-bottom: 5px;
    text-align: center;
  }
  .cal-grid-wrap { flex: 1; }
  .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    border-left: 1.5px solid #d4d0db;
    border-top: 1.5px solid #d4d0db;
  }
  .cal-col-hdr {
    border-right: 1.5px solid #d4d0db;
    border-bottom: 1.5px solid #d4d0db;
    padding: 7px 4px; text-align: center;
    font-family: 'Montserrat', sans-serif;
    font-size: 12px; font-weight: 600;
    color: #2d3a6a;
  }
  .cal-cell {
    border-right: 1.5px solid #d4d0db;
    border-bottom: 1.5px solid #d4d0db;
    padding: 7px 7px 8px;
    min-height: 90px; vertical-align: top;
  }
  .cal-cell-num {
    font-family: 'Nunito', sans-serif;
    font-size: 13px; font-weight: 700;
    color: #2d3a6a; display: block; margin-bottom: 4px;
  }
  .cal-cell-num.dim { color: #ccc; }
  .cal-chip {
    display: block; font-size: 9.5px; font-weight: 700;
    padding: 3px 6px; border-radius: 3px;
    margin-bottom: 3px; line-height: 1.35;
    text-align: center;
  }
  #cal-dl-bar {
    margin-top: 16px; text-align: center; flex-shrink: 0;
  }
  /* ── Editable calendar affordances ──────────────────── */
  .cal-cell { position: relative; }
  .cal-chip { cursor: grab; }
  .cal-chip:active { cursor: grabbing; }
  .cal-chip:hover { outline: 1.5px solid rgba(0,0,0,.28); outline-offset: -1px; }
  .cal-chip.cal-dragging { opacity: .4; }
  .cal-cell.cal-cell-drop { background: #fdf0f5; outline: 2px dashed #b03060; outline-offset: -2px; }
  .cal-exporting .cal-cell.cal-cell-drop { background: none; outline: none; }
  .cal-add {
    position: absolute; bottom: 4px; right: 4px;
    width: 18px; height: 18px; line-height: 16px;
    border-radius: 50%; border: 1px solid #d0a0b5;
    background: #fff; color: #b03060;
    font-size: 14px; font-weight: 700; text-align: center;
    cursor: pointer; padding: 0;
    opacity: 0; transition: opacity .12s;
  }
  .cal-cell:hover .cal-add { opacity: 1; }
  .cal-add:hover { background: #b03060; color: #fff; }
  /* Hidden while exporting the PNG so the downloaded calendar stays clean */
  .cal-exporting .cal-add { display: none !important; }
  .cal-exporting .cal-chip:hover { outline: none; }
  /* ── Post editor modal ─────────────────────────────── */
  #cal-edit-modal {
    position: fixed; inset: 0; background: rgba(0,0,0,.5);
    z-index: 650; display: none;
    align-items: center; justify-content: center;
  }
  #cal-edit-modal.open { display: flex; }
  #cal-edit-inner {
    background: #fff; border-radius: 10px;
    width: 340px; padding: 20px 22px 18px;
    box-shadow: 0 12px 40px rgba(0,0,0,.25);
  }
  #cal-edit-inner h3 {
    font-family: 'Montserrat', sans-serif;
    font-size: 12px; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; color: #2d3a6a; margin-bottom: 14px;
  }
  #cal-edit-modal .ol { margin-top: 10px; }
  .cal-edit-actions {
    display: flex; gap: 8px; align-items: center; margin-top: 18px;
  }
  .cal-edit-del {
    background: none; border: none; color: #c0392b;
    font-family: 'Nunito', sans-serif; font-size: 12px;
    font-weight: 700; cursor: pointer; margin-right: auto; padding: 6px 4px;
  }
  .cal-edit-del:hover { text-decoration: underline; }
  .cal-edit-cancel {
    background: #eee; border: none; border-radius: 4px;
    padding: 8px 14px; font-family: 'Montserrat', sans-serif;
    font-size: 11px; font-weight: 700; letter-spacing: .06em;
    cursor: pointer; color: #555;
  }

  /* ══════════════════════════════════════════════════════
     TEMPLATE STYLES — all measured at 1080px canvas width
     ══════════════════════════════════════════════════════ */

  .tpl { position: relative; width: 100%; overflow: hidden; }

  /* Beige diamond-crosshatch background */
  .tpl-beige {
    background-color: #ece8e2;
    background-image:
      repeating-linear-gradient( 45deg, transparent, transparent 24px, rgba(80,55,30,.06) 24px, rgba(80,55,30,.06) 25px),
      repeating-linear-gradient(-45deg, transparent, transparent 24px, rgba(80,55,30,.06) 24px, rgba(80,55,30,.06) 25px);
  }

  /* ── Animation keyframes (10-second clip preview) ─────── */
  @keyframes floatIn {
    from { opacity: 0; transform: translateY(26px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes photo1Fade {
    0%,44%  { opacity: 1; }
    56%,100%{ opacity: 0; }
  }
  @keyframes photo2Fade {
    0%,44%  { opacity: 0; }
    56%,100%{ opacity: 1; }
  }

  </style>
</head>
<body>

<!-- ── Lock Screen ───────────────────────────────────────── -->
<div id="lock">
  <img id="lock-logo" src="/images/sama-yoga-logo.webp" alt="Sama Yoga" onerror="this.style.display='none'">
  <h1>Social Studio</h1>
  <p id="lock-sub">Internal Tool · Sama Yoga Center</p>
  <div class="lock-row">
    <input id="lock-pw" type="password" placeholder="Password" autocomplete="off">
    <button class="btn-pink" onclick="unlock()">Enter</button>
  </div>
  <div id="lock-err"></div>
</div>

<!-- ── Studio ────────────────────────────────────────────── -->
<div id="studio">

  <div id="sidebar">
    <div id="sb-head">
      <img src="/images/sama-yoga-logo.webp" alt="Sama Yoga" onerror="this.style.display='none'">
      <span>Social Studio</span>
    </div>

    <div id="mode-tabs">
      <button class="mode-tab active" id="tab-studio" onclick="setMode('studio')">🎨 Studio</button>
      <button class="mode-tab" id="tab-newsletter" onclick="setMode('newsletter')">📰 Newsletter</button>
      <button class="mode-tab" id="tab-calendar" onclick="setMode('calendar')">📅 Calendar</button>
    </div>

    <!-- ── Calendar sidebar controls ───────────────────── -->
    <div id="cal-controls">
      <div id="cal-picker">
        <div class="og">
          <label class="ol">Month</label>
          <select class="os" id="cal-month-sel" onchange="updateCalendar()">
            <option value="0">January</option><option value="1">February</option>
            <option value="2">March</option><option value="3">April</option>
            <option value="4">May</option><option value="5">June</option>
            <option value="6">July</option><option value="7">August</option>
            <option value="8">September</option><option value="9">October</option>
            <option value="10">November</option><option value="11">December</option>
          </select>
        </div>
        <div class="og">
          <label class="ol">Year</label>
          <input class="oi" id="cal-year-inp" type="number" value="2026" min="2024" max="2030" oninput="updateCalendar()">
        </div>
      </div>
      <!-- ── Custom key dates ──────────────────────────── -->
      <div id="cal-custom-section" style="padding:10px 14px 8px;border-bottom:1px solid #eee;flex-shrink:0">
        <span class="cal-sb-heading">Add Key Date</span>
        <div style="display:flex;gap:5px;align-items:stretch;margin-bottom:8px">
          <input class="oi" id="cal-custom-name" placeholder="Event name…"
                 style="flex:1;margin-bottom:0"
                 onkeydown="if(event.key==='Enter')addCalCustomEvent()">
          <input class="oi" id="cal-custom-day" type="number" min="1" max="31"
                 placeholder="Day"
                 style="flex:0 0 52px;margin-bottom:0;text-align:center"
                 onkeydown="if(event.key==='Enter')addCalCustomEvent()">
          <button class="btn-pink" onclick="addCalCustomEvent()"
                  style="padding:6px 10px;font-size:11px;letter-spacing:.04em;flex-shrink:0">+</button>
        </div>
        <div id="cal-custom-list"></div>
      </div>
      <div id="cal-edit-help" style="padding:9px 14px;border-bottom:1px solid #eee;flex-shrink:0">
        <p class="hint" style="margin:0 0 7px">Drag a post to another day to move it. Click a post to edit or delete it. Hover a day and click <strong style="color:#b03060">+</strong> to add one. Edits are saved automatically.</p>
        <button class="cal-edit-cancel" style="width:100%" onclick="regenerateSchedule()" title="Discard edits for this month and rebuild from events">↺ Regenerate this month</button>
      </div>
      <div id="cal-key-sidebar"></div>
    </div>

    <div id="picker-wrap">

<script>
'use strict';

// ════════════════════════════════════════════════════════

// ════════════════════════════════════════════════════════

const PINK     = '#b03060';
const LOGO_URL = '/images/sama-yoga-logo.webp';
const _V       = '?v=' + Date.now();   // cache-buster — forces fresh image on every page load
const ENZO_BG  = '/images/Social%20Media/background.png'  + _V;

// ── Templates registry ───────────────────────────────────

  { id:'behind-pose',   label:'Behind the Pose',         ico:'🧘', w:1080, h:1080 },

  { id:'class-type',    label:'Class Type Carousel',      ico:'🎴', w:1080, h:1350 },
  { id:'thread',        label:'Continuous Thread',        ico:'🧵', w:1080, h:1350 },

// ── App state ────────────────────────────────────────────
const S = {
  tpl: 'event-post',
  // event
  eventIdx: 0,
  photo: null, photo2: null, bgPhoto: null, mainPhoto: null, cardBg: null,

  pinkWords: '', cta: 'Join us this weekend!',
  storyFooter: 'Click the link to reserve your spot now',
  // instructor / meet
  instIdx: 0,
  instPhoto: null,
  q1:'', a1:'', q2:'', a2:'', q3:'', a3:'', q4:'', a4:'', q5:'', a5:'',
  // monthly
  monthLabel: '', monthIdxs: [], monthCustom: [],
  // tips
  tipsType: 'cover', tipsMonth: '', tipsTheme: '', tipsTxt: '', tipsBg: null,
  // behind pose
  poseBg: null, poseSanskrit: '', poseEnglish: '',
  behindBoxLeft: null, behindBoxTop: null,
  // teacher training / testimonial

const DEFAULT_QS = [
  'What are your hobbies outside of yoga?',

];

// ── Data ─────────────────────────────────────────────────
let events = [];
let instructors = [];
let sitePhotos = [];

// ── Lock ─────────────────────────────────────────────────
function unlock() {
  const v = document.getElementById('lock-pw').value.trim().toLowerCase();
  if (v === PASSWORD.toLowerCase()) {
    document.getElementById('lock').style.display = 'none';
    document.getElementById('studio').classList.add('on');
    init();
  } else {
    document.getElementById('lock-err').textContent = 'Incorrect password.';
  }
}
document.getElementById('lock-pw').addEventListener('keydown', e => { if (e.key==='Enter') unlock(); });

// ── Init ─────────────────────────────────────────────────
async function init() {
  buildGrid();
  pickTpl('event-post');

  // Load data
  try {
    const d = await fetch('data/events.json?v='+Date.now()).then(r=>r.json());
    events = (d.events||[]).filter(e=>!e.hidden);
  } catch(e) {}
  try {
    const d = await fetch('data/team.json?v='+Date.now()).then(r=>r.json());
    instructors = [
      ...(d.weekly||[]).filter(i=>!i.hidden).map(i=>({...i,grp:'Weekly'})),
      ...(d.substitutes||[]).filter(i=>!i.hidden).map(i=>({...i,grp:'Substitute & Guest'})),
    ];
  } catch(e) {}

  // Collect ALL site photo URLs — every image in every data file (recursively,
  // regardless of field name) plus any image referenced on the public pages.
  const imgs = new Set();
  const IMG_RE = /\.(?:webp|jpe?g|png|avif|gif)(?:\?|$)/i;
  const norm = u => u.replace(/^\.?\//, '/').replace(/^(?!\/|https?:)/, '/');
  const walkImgs = o => {
    if (!o) return;
    if (typeof o === 'string') { if (/images\//i.test(o) && IMG_RE.test(o)) imgs.add(norm(o)); return; }
    if (typeof o === 'object') Object.values(o).forEach(walkImgs);
  };
  const dataFiles = ['events.json','team.json','classes.json','kids.json','private-lessons.json','teacher-training.json'];
  await Promise.all(dataFiles.map(async f => {
    try { walkImgs(await fetch('data/'+f+'?v='+Date.now()).then(r=>r.json())); } catch(e) {}
  }));
  const pages = ['index.html','classes.html','private-sessions.html','kids-yoga.html',
                 'teacher-training.html','events.html','team.html','pricing.html','studio-rentals.html','contact.html'];
  await Promise.all(pages.map(async p => {
    try {
      const html = await fetch(p+'?v='+Date.now()).then(r=>r.text());
      (html.match(/\/?images\/[^"'()\s>]+?\.(?:webp|jpe?g|png|avif|gif)/gi) || []).forEach(u => imgs.add(norm(u)));
    } catch(e) {}
  }));
  sitePhotos = [...imgs];
  buildSiteGrid();

  // Set defaults
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  S.tipsMonth  = months[new Date().getMonth()];
  S.monthLabel = months[new Date().getMonth()].toUpperCase();
  DEFAULT_QS.forEach((q,i)=>{ S['q'+(i+1)] = q; });

  if (events.length) selectEvent(0);
  if (instructors.length) selectInst(0);
  renderOpts();
  updatePreview();
  setMode('studio');   // apply per-tab section visibility (hides newsletter grid)
}

// ── Template grid ────────────────────────────────────────
function buildGrid() {
  const toBtn = t =>
    `<button class="tpl-btn" id="tb-${t.id}" onclick="pickTpl('${t.id}')">
       <span class="ico">${t.ico}</span>${t.label}
     </button>`;
  document.getElementById('tpl-grid').innerHTML =
    TMPLS.filter(t => !t.id.startsWith('nl-')).map(toBtn).join('');
  document.getElementById('nl-grid').innerHTML =
    TMPLS.filter(t =>  t.id.startsWith('nl-')).map(toBtn).join('');
}

function pickTpl(id) {
  S.tpl = id;
  S.slideIdx = 0;
  document.querySelectorAll('.tpl-btn').forEach(b=>b.classList.remove('active'));
  const b = document.getElementById('tb-'+id);
  if (b) b.classList.add('active');
  renderOpts();
  updatePreview();
  const t = TMPLS.find(x=>x.id===id)||TMPLS[0];
  const carousel = isCarousel(id);
  document.getElementById('dl-info').textContent = carousel
    ? `${t.w} × ${t.h} px · ${carouselCount(id)} slides`
    : `${t.w} × ${t.h} px`;
  document.getElementById('dl-btn').textContent = carousel ? '⬇ Download All Slides' : '⬇ Download PNG';
  document.getElementById('vid-btn').style.display =
    ['event-post','event-story','event-card'].includes(id) ? '' : 'none';
}

// ── Options panel ────────────────────────────────────────

// ── Utilities ────────────────────────────────────────────
function x(s) {  // html-escape for attributes/text
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function bg(url, pos) {
  return url
    ? `background:url('${url.replace(/'/g,"\\'")}') ${pos||'center'}/cover no-repeat`
    : `background:#d0ccc6`;
}

// ── Pan/zoom photo framing ────────────────────────────────
// The image is sized to its true cover dimensions × zoom and then translated,
// so it can be dragged in BOTH axes — and still pans when zoomed in.
const _imgAR = {};                          // url → naturalWidth/naturalHeight
function cacheAR(url) {
  if (!url || _imgAR[url] !== undefined) return;
  _imgAR[url] = null;                        // pending (use frame aspect until it loads)
  const im = new Image();
  im.onload  = () => { if (im.naturalHeight) { _imgAR[url] = im.naturalWidth / im.naturalHeight; updatePreview(); } };
  im.onerror = () => { _imgAR[url] = 0; };
  im.src = url;
}
function frameFor(key) {                     // returns the {x,y,zoom} framing for a pan key
  if (key === 'ctSlide') {
    const s = S.ctSlides[S.slideIdx] || {};
    if (s.x == null) s.x = 0; if (s.y == null) s.y = 0; if (s.zoom == null) s.zoom = 1;
    return s;
  }
  const k = key + 'Frame';
  if (!S[k]) S[k] = { x: 0, y: 0, zoom: 1 };
  return S[k];
}
function setFrameZoom(key, z) { frameFor(key).zoom = z; updatePreview(); }
function _coverBox(url, W, H, zoom) {
  const ar = _imgAR[url] || (W / H);         // fall back to frame aspect until natural size loads
  let cw = W, ch = W / ar;
  if (ch < H) { ch = H; cw = H * ar; }
  return { cw: cw * zoom, ch: ch * zoom, ovx: Math.max(0, cw * zoom - W), ovy: Math.max(0, ch * zoom - H) };
}
// layers: [{url, extra}] sharing one frame; extra = per-layer style (e.g. crossfade opacity).
function pphoto(layers, fr, panKey, W, H) {
  const prim = (layers.find(l => l.url) || {}).url;
  if (!prim) return `<div style="position:absolute;inset:0;background:linear-gradient(135deg,#3a2a30,#241c20)"></div>`;
  cacheAR(prim);
  const zoom = fr && fr.zoom != null ? fr.zoom : 1;
  const { cw, ch, ovx, ovy } = _coverBox(prim, W, H, zoom);
  const nx = fr && fr.x != null ? fr.x : 0, ny = fr && fr.y != null ? fr.y : 0;
  const tx = nx * ovx / 2, ty = ny * ovy / 2;
  const inner = layers.map(l => l.url
    ? `<div style="position:absolute;left:50%;top:50%;width:${cw.toFixed(1)}px;height:${ch.toFixed(1)}px;${bg(l.url,'center')};transform:translate(-50%,-50%) translate(${tx.toFixed(1)}px,${ty.toFixed(1)}px);${l.extra||''}"></div>`
    : '').join('');
  return `<div data-pan="${panKey}" data-ovx="${ovx.toFixed(1)}" data-ovy="${ovy.toFixed(1)}" style="position:absolute;inset:0;overflow:hidden;cursor:grab">${inner}</div>`;
}
function ord(s) {  // superscript ordinal suffixes
  return String(s||'').replace(/(\d+)(st|nd|rd|th)\b/gi,'$1<sup style="font-size:.55em;vertical-align:super">$2</sup>');
}
function pink(text, words) {
  if (!words||!words.trim()) return text;
  let out = text;
  words.split(',').map(w=>w.trim()).filter(Boolean).forEach(w => {
    const safe = w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    out = out.replace(new RegExp(`(${safe})`,'gi'), `<span style="color:${PINK}">$1</span>`);
  });
  return out;
}
// Newsletter rich-text: split a textarea string into lines; a line starting
// with "-" or "•" becomes a bullet row. Preserves multi-line lists for cards.
function nlMultiline(text) {
  const lines = String(text||'').split(/\r?\n/).map(l=>l.replace(/\s+$/,'')).filter(l=>l.trim()!=='');
  if (!lines.length) return '';
  return lines.map(line => {
    // Leading spaces/tabs = indent (2 spaces or 1 tab per level).
    const lead   = (line.match(/^[ \t]*/) || [''])[0];
    const level  = Math.floor(lead.replace(/\t/g, '  ').length / 2);
    const pad    = level ? `padding-left:${(level * 1.5).toFixed(2)}em;` : '';
    const rest   = line.slice(lead.length);
    const m = rest.match(/^[-•]\s*(.*)$/);
    if (m) {
      return `<div style="display:flex;gap:.45em;text-align:left;margin-bottom:.18em;${pad}"><span style="flex-shrink:0">–</span><span>${x(m[1])}</span></div>`;
    }
    return `<div style="margin-bottom:.18em;${pad}">${x(rest)}</div>`;
  }).join('');
}
// Inline formatting for rich newsletter text: **bold** and *italic*.
// Escapes HTML first, so the markers are the only thing that becomes markup.
function nlInline(s) {
  return x(s)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,      '<em>$1</em>')
    .replace(/__(.+?)__/g,      '<strong>$1</strong>')
    .replace(/_(.+?)_/g,        '<em>$1</em>');
}
// Rich multi-paragraph text for the Intro Message. Each line can be:
//   # / ## / ###  → three heading sizes (change size per paragraph)
//   - or •        → a bullet list item
//   leading spaces→ indent (2 spaces / 1 tab per level)
// plus **bold** and *italic* anywhere. Blank lines add spacing.
function nlRich(text, align) {
  const s     = nlScale();
  const SIZE  = { h1: 40, h2: 32, h3: 26, p: 22 };
  const lines = String(text || '').split(/\r?\n/);
  if (!lines.some(l => l.trim())) return `<div style="color:#ccc">Write your intro message…</div>`;
  return lines.map(raw => {
    if (!raw.trim()) return `<div style="height:.7em"></div>`;          // blank line = spacer
    const lead  = (raw.match(/^[ \t]*/) || [''])[0];
    const level = Math.floor(lead.replace(/\t/g, '  ').length / 2);
    const pad   = level ? `padding-left:${(level * 1.6).toFixed(2)}em;` : '';
    let   body  = raw.slice(lead.length);
    let   size  = SIZE.p, weight = '400';
    let   h = body.match(/^(#{1,3})\s+(.*)$/);
    if (h) { const n = h[1].length; size = n === 1 ? SIZE.h1 : n === 2 ? SIZE.h2 : SIZE.h3; weight = '700'; body = h[2]; }
    const fs = `font-size:${Math.round(size * s)}px;font-weight:${weight};`;
    const bullet = body.match(/^[-•]\s*(.*)$/);
    if (bullet) {
      return `<div style="display:flex;gap:.5em;text-align:left;${pad}margin-bottom:.35em;${fs}"><span style="flex-shrink:0">–</span><span>${nlInline(bullet[1])}</span></div>`;
    }
    return `<div style="text-align:${align || 'left'};${pad}margin-bottom:.35em;${fs}line-height:1.45">${nlInline(body)}</div>`;
  }).join('');
}

// ── Draggable boxes ───────────────────────────────────────
// Certain template boxes (behind-pose, teacher training) can be repositioned
// by dragging them in the preview. Mouse coords are converted to template
// space by dividing by the current scale factor.

let _drag = null;

function _getScale() {
  const tpl = TMPLS.find(t=>t.id===S.tpl)||TMPLS[0];
  const area = document.getElementById('preview-area');
  return Math.min((area.clientWidth-48)/tpl.w, (area.clientHeight-80)/tpl.h, 1);
}

document.getElementById('preview-wrap').addEventListener('mousedown', e => {
  // Photo panning (reposition a cover image's framing by dragging it).
  const panEl = e.target.closest('[data-pan]');
  if (panEl) {
    const key = panEl.dataset.pan;
    const fr = frameFor(key);
    _drag = {
      pan: true, el: panEl, key,
      ovx: parseFloat(panEl.dataset.ovx) || 0,
      ovy: parseFloat(panEl.dataset.ovy) || 0,
      scale: _getScale(), startX: e.clientX, startY: e.clientY,
      origX: fr.x != null ? fr.x : 0, origY: fr.y != null ? fr.y : 0,
    };
    panEl.style.cursor = 'grabbing';
    e.preventDefault();
    return;
  }
  const el = e.target.closest('[data-drag]');
  if (!el) return;
  const dkey = el.dataset.drag;
  const slideBox = dkey === 'ctBox';                 // carousel content box → stored per-slide
  const cur = slideBox ? (S.ctSlides[S.slideIdx] || {}) : null;
  _drag = {
    key:     dkey, slideBox,
    scale:   _getScale(),
    startX:  e.clientX,
    startY:  e.clientY,
    origLeft: slideBox ? (cur.boxLeft != null ? cur.boxLeft : 80)  : (parseFloat(el.style.left) || 0),
    origTop:  slideBox ? (cur.boxTop  != null ? cur.boxTop  : 800) : (parseFloat(el.style.top)  || 0),
  };
  el.style.cursor = 'grabbing';
  e.preventDefault();
});
document.addEventListener('mousemove', e => {
  if (!_drag) return;
  if (_drag.pan) {
    const dxT = (e.clientX - _drag.startX) / _drag.scale;
    const dyT = (e.clientY - _drag.startY) / _drag.scale;
    // Drag the image directly (both axes); offsets are normalised to -1..1 of the overflow.
    let nx = _drag.ovx > 0 ? _drag.origX + dxT / (_drag.ovx / 2) : 0;
    let ny = _drag.ovy > 0 ? _drag.origY + dyT / (_drag.ovy / 2) : 0;
    nx = Math.max(-1, Math.min(1, nx)); ny = Math.max(-1, Math.min(1, ny));
    const fr = frameFor(_drag.key); fr.x = nx; fr.y = ny;
    const tx = (nx * _drag.ovx / 2).toFixed(1), ty = (ny * _drag.ovy / 2).toFixed(1);
    _drag.el.querySelectorAll(':scope > div').forEach(d => { d.style.transform = `translate(-50%,-50%) translate(${tx}px,${ty}px)`; });
    return;
  }
  const newLeft = _drag.origLeft + (e.clientX - _drag.startX) / _drag.scale;
  const newTop  = _drag.origTop  + (e.clientY - _drag.startY) / _drag.scale;
  if (_drag.slideBox) { const s = S.ctSlides[S.slideIdx]; if (s) { s.boxLeft = newLeft; s.boxTop = newTop; } }
  else { S[_drag.key + 'Left'] = newLeft; S[_drag.key + 'Top']  = newTop; }
  const el = document.querySelector(`[data-drag="${_drag.key}"]`);
  if (el) { el.style.left = newLeft+'px'; el.style.top = newTop+'px'; }
});
document.addEventListener('mouseup', () => {
  if (_drag) {
    if (_drag.pan) { if (_drag.el) _drag.el.style.cursor = 'grab'; }
    else {
      const el = document.querySelector(`[data-drag="${_drag.key}"]`);
      if (el) el.style.cursor = 'grab';
    }
    _drag = null;
  }
});

// ── Animation helpers ─────────────────────────────────────
// animT: undefined = live CSS animation; 'static' = no anim (PNG export); number = computed frame (video)

/** Returns style string for text float-in effect. */
function animFi(animT, delay, dur) {
  dur = dur || 0.9;
  if (animT === undefined) return `animation:floatIn ${dur}s ${delay}s ease both`;
  if (animT === 'static')  return 'opacity:1;transform:none';
  const p = Math.min(1, Math.max(0, (animT - delay) / dur));
  const y  = (26 * (1 - p)).toFixed(1);
  return `opacity:${p.toFixed(3)};transform:translateY(${y}px)`;
}

/** Style string for photo slot 1 (shows first 5 s, fades out). */
function animP1(animT) {
  if (animT === undefined) return 'animation:photo1Fade 10s linear both';
  if (animT === 'static')  return 'opacity:1';
  const o = animT < 4.5 ? 1 : animT > 5.5 ? 0 : +(1 - (animT - 4.5)).toFixed(3);
  return `opacity:${o}`;
}

/** Style string for photo slot 2 (fades in at 5 s). */
function animP2(animT) {
  if (animT === undefined) return 'animation:photo2Fade 10s linear both';
  if (animT === 'static')  return 'opacity:0';
  const o = animT < 4.5 ? 0 : animT > 5.5 ? 1 : +((animT - 4.5)).toFixed(3);
  return `opacity:${o}`;
}

// ── Preview ──────────────────────────────────────────────
function updatePreview() {
  document.getElementById('tpl-full').innerHTML = render();
  scalePreview();
}

function scalePreview() {
  const t   = TMPLS.find(t=>t.id===S.tpl)||TMPLS[0];
  const area = document.getElementById('preview-area');
  const wrap = document.getElementById('preview-wrap');
  const full = document.getElementById('tpl-full');
  // Width is fixed by the template; height may grow (e.g. taller newsletter cards),
  // so measure the actual rendered height rather than assuming t.h.
  full.style.width  = t.w + 'px';
  full.style.height = 'auto';
  full.style.transform = 'none';
  const inner = full.firstElementChild;
  const realH = inner ? inner.offsetHeight : t.h;
  const maxW = area.clientWidth  - 48;
  const maxH = area.clientHeight - 80;
  const scale = Math.min(maxW/t.w, maxH/realH, 1);
  full.style.height = realH + 'px';
  full.style.transform = `scale(${scale})`;
  wrap.style.width  = Math.round(t.w * scale) + 'px';
  wrap.style.height = Math.round(realH * scale) + 'px';
}
window.addEventListener('resize', scalePreview);

// ── Template dispatcher ──────────────────────────────────
function render(animT) {
  switch (S.tpl) {
    case 'event-post':    return tEventPost(animT);
    case 'event-story':   return tEventStory(animT);
    case 'event-card':    return tEventCard(animT);
    case 'monthly':       return tMonthly();
    case 'monthly-story': return tMonthlyStory();
    case 'get-to-know':   return tGetToKnow();
    case 'meet':          return tMeet();
    case 'tips':          return tTips();
    case 'behind-pose':   return tBehindPose();
    case 'testimonial':   return tTestimonial();
    case 'ytt-cover':     return tYttCover();
    case 'class-type':     return tClassTypeSlide(S.slideIdx||0, animT);
    case 'thread':         return tThreadSlide(S.slideIdx||0, animT);
    case 'nl-cover':       return tNlCover();
    case 'nl-event-pink':  return tNlEventPink();
    case 'nl-event-white': return tNlEventWhite();
    case 'nl-event-photo':  return tNlEventPhoto();
    case 'nl-intro':        return tNlIntro();
    default: return '';
  }
}

// ── Continuous Thread carousel ───────────────────────────
const SAMA_THREAD       = ['#b03060', '#d98aa6', '#c9a96a', '#e7d9c3', '#8fae9b', '#a98c9a']; // on dark
const SAMA_THREAD_LIGHT = ['#b03060', '#c0567a', '#a8843f', '#6f8e7a', '#7a5c70', '#9a7a4a']; // on light
// Each line starts at an equally-spaced y on the cover (x=0) and ends at its class
// slide where the class name appears. y(x) is a single continuous function per line,
// so curves line up exactly at slide seams.
const CT_NAME_LEAD = 230;
const CT_LINE_START_X = 968;                    // lines begin near the numbers on the cover's right
function ctThreadLines(count) {
  const lineN = Math.max(1, count - 1);
  const top = 200, bot = 1180;                  // numbers/names spread top→bottom on the right
  const lines = [];
  for (let i = 0; i < lineN; i++) {
    const startY = lineN <= 1 ? (top + bot) / 2 : top + (bot - top) * (i / (lineN - 1));
    lines.push({
      startX: CT_LINE_START_X, startY, endY: startY,
      endX: (i + 1) * 1080 + CT_NAME_LEAD,
      amp: (90 + 30 * (i % 3)) * (i % 2 ? 1 : -1),
      waves: (i % 3) + 1,
    });
  }
  return lines;
}
function ctYAt(ln, x) {
  const span = ln.endX - ln.startX;
  const p = Math.max(0, Math.min(1, (x - ln.startX) / span));
  // Ease the wave in over the first ~520px so each line leaves the cover fairly
  // straight before it starts curving.
  const ramp = Math.min(1, (x - ln.startX) / 520);
  return ln.startY + (ln.endY - ln.startY) * p + ln.amp * ramp * Math.sin(p * Math.PI * ln.waves);
}
function threadSVG(s, count, colors) {
  const W = 1080, H = 1350;
  const lines = ctThreadLines(count);
  let out = '';
  lines.forEach((ln, i) => {
    const xStart = Math.max(s * W, ln.startX), xEnd = Math.min((s + 1) * W, ln.endX);
    if (xEnd <= xStart) return;                 // line not present on this slide
    let d = '';
    for (let x = xStart; x <= xEnd; x += 14) {
      d += (d === '' ? 'M' : 'L') + (x - s * W).toFixed(1) + ' ' + ctYAt(ln, x).toFixed(1) + ' ';
    }
    const col = colors[i % colors.length];
    out += `<path d="${d}" fill="none" stroke="${col}" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>`;
    if (ln.endX <= (s + 1) * W) {               // line terminates on this slide → end dot
      out += `<circle cx="${(ln.endX - s * W).toFixed(1)}" cy="${ctYAt(ln, ln.endX).toFixed(1)}" r="13" fill="${col}"/>`;
    }
  });
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">${out}</svg>`;
}
function tThreadSlide(i, animT) {
  const count  = S.ctThreadCount || 4;
  const light  = !!S.ctThreadLight;
  const colors = light ? SAMA_THREAD_LIGHT : SAMA_THREAD;
  const bgc    = light ? '#f3ede3' : '#241c20';
  const txt    = light ? '#2d2424' : '#ffffff';
  const lines  = ctThreadLines(count);
  const uri    = `url('data:image/svg+xml,${encodeURIComponent(threadSVG(i, count, colors))}')`;
  let overlay = '';
  if (i === 0) {
    let nums = '';
    lines.forEach((ln, k) => {
      nums += `<div style="position:absolute;right:128px;top:${(ln.startY - 42).toFixed(0)}px;width:120px;text-align:right;font-family:'Montserrat',sans-serif;font-size:74px;font-weight:800;color:${txt}">${k + 1}</div>`;
    });
    overlay = `
      <div style="position:absolute;left:80px;right:360px;top:0;bottom:0;display:flex;flex-direction:column;justify-content:center">
        <div style="font-family:'Montserrat',sans-serif;font-size:24px;font-weight:700;letter-spacing:.26em;text-transform:uppercase;color:${light?'#b03060':'rgba(255,255,255,.85)'}">Sama Yoga Center</div>
        <div style="font-family:'Cormorant Garamond',serif;font-size:74px;font-weight:400;color:${txt};line-height:1.08;margin-top:24px">${x(S.ctThreadTitle)||'Pick a number…'}</div>
      </div>
      ${nums}`;
  } else {
    const ln   = lines[i - 1];
    const name = S.ctThreadNames[i - 1] || 'Class Name';
    const ey   = ctYAt(ln, ln.endX);
    const shadow = light ? 'text-shadow:0 1px 8px rgba(255,255,255,.7)' : 'text-shadow:0 2px 18px rgba(0,0,0,.55)';
    overlay = `
      <div style="position:absolute;left:${CT_NAME_LEAD + 24}px;right:60px;top:${(ey - 60).toFixed(0)}px">
        <div style="font-family:'Montserrat',sans-serif;font-size:84px;font-weight:800;letter-spacing:.01em;text-transform:uppercase;color:${txt};${shadow}">${x(name)}</div>
      </div>`;
  }
  return `
<div class="tpl" style="height:1350px;background:${bgc} ${uri} center/cover no-repeat">
  ${overlay}
  <div style="position:absolute;bottom:40px;left:50%;transform:translateX(-50%)">${samyHandle(light ? '#9a7080' : 'rgba(255,255,255,.72)')}</div>
</div>`;
}

// ── Carousel editing helpers ─────────────────────────────
function ctGo(delta) {
  const n = carouselCount(S.tpl);
  S.slideIdx = Math.max(0, Math.min(n - 1, (S.slideIdx || 0) + delta));
  renderOpts(); updatePreview();
}
function setSlideProp(prop, val) { const s = S.ctSlides[S.slideIdx]; if (s) { s[prop] = val; updatePreview(); } }
function ctSetCount(n) {
  n = Math.max(2, Math.min(6, n));
  while (S.ctSlides.length < n) S.ctSlides.push({ header: 'New Class', blurb: 'Describe this class type…', photo: null, x: 0, y: 0, zoom: 1 });
  while (S.ctSlides.length > n) S.ctSlides.pop();
  if (S.slideIdx >= n) S.slideIdx = n - 1;
  renderOpts(); updatePreview();
}
function ctThreadSetCount(n) {
  n = Math.max(2, Math.min(6, n));
  S.ctThreadCount = n;
  while (S.ctThreadNames.length < n - 1) S.ctThreadNames.push('Class ' + (S.ctThreadNames.length + 1));
  while (S.ctThreadNames.length > n - 1) S.ctThreadNames.pop();
  if (S.slideIdx >= n) S.slideIdx = n - 1;
  renderOpts(); updatePreview();
}
function setThreadName(i, val) { S.ctThreadNames[i] = val; updatePreview(); }
function oPhotoSlide(label, val) {
  return `<div class="og"><label class="ol">${label}</label>
    <button class="ppbtn" onclick="openModal('ctSlide')">

      <span>${val ? 'Change photo' : 'Choose photo…'}</span>
    </button></div>`;
}
// Slide navigation strip shown atop the options for carousel templates.
function oCarouselNav(n) {
  const i = S.slideIdx || 0;
  const dots = Array.from({length:n}, (_,k) =>
    `<button onclick="ctGo(${k-i})" title="Slide ${k+1}" style="width:22px;height:22px;border-radius:50%;border:none;cursor:pointer;font-size:11px;font-weight:700;background:${k===i?'#b03060':'#e7d7df'};color:${k===i?'#fff':'#9a6b80'}">${k+1}</button>`
  ).join('');
  return `<div class="og" style="display:flex;align-items:center;gap:8px;justify-content:center">
    <button class="cal-edit-cancel" onclick="ctGo(-1)" ${i===0?'disabled style="opacity:.4"':''}>‹</button>
    <div style="display:flex;gap:5px">${dots}</div>
    <button class="cal-edit-cancel" onclick="ctGo(1)" ${i===n-1?'disabled style="opacity:.4"':''}>›</button>
  </div>`;
}

// ── Download Video (10-second MP4) ───────────────────────
// Priority: 1) MediaRecorder+MP4 (Chrome 130+/macOS)
//           2) WebCodecs + mp4-muxer → H.264 MP4 (Chrome 94+)
//           3) WebM fallback
async function downloadVideo() {
  const tplDef = TMPLS.find(t=>t.id===S.tpl)||TMPLS[0];
  const FPS = 10, DURATION = 10, total = FPS * DURATION;

  const vidBtn = document.getElementById('vid-btn');
  vidBtn.disabled = true;

  const canvas = document.createElement('canvas');
  canvas.width = tplDef.w; canvas.height = tplDef.h;
  const ctx = canvas.getContext('2d');

  const wrap = document.createElement('div');
  wrap.style.cssText = `position:fixed;left:${-(tplDef.w+200)}px;top:0;width:${tplDef.w}px;height:${tplDef.h}px;overflow:hidden`;
  document.body.appendChild(wrap);
  await document.fonts.ready;
  await new Promise(r => setTimeout(r, 200));

  const frames = [];
  try {
    // ── Phase 1: render every frame ──────────────────────
    for (let f = 0; f <= total; f++) {
      wrap.innerHTML = render((f / total) * DURATION);
      await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
      frames.push(await html2canvas(wrap, {
        scale: 1, useCORS: true, allowTaint: false,
        width: tplDef.w, height: tplDef.h, logging: false,
      }));
      if (f % 4 === 0) vidBtn.textContent = `Rendering… ${Math.round((f/total)*100)}%`;
    }
    document.body.removeChild(wrap);

    // ── Phase 2: encode ───────────────────────────────────
    let blob, ext;

    // Try 1 — MediaRecorder native MP4 (Chrome 130+ / macOS)
    const nativeMp4 = ['video/mp4;codecs=avc1', 'video/mp4']
      .find(m => MediaRecorder.isTypeSupported(m));
    if (nativeMp4) {
      vidBtn.textContent = 'Encoding MP4…';
      blob = await _mrBlob(frames, canvas, ctx, FPS, nativeMp4);
      ext  = 'mp4';

    // Try 2 — WebCodecs + mp4-muxer → H.264 MP4 (Chrome 94+)
    } else if (window.VideoEncoder) {
      vidBtn.textContent = 'Encoding MP4…';
      try {
        blob = await _wcBlob(frames, tplDef, FPS, vidBtn);
        ext  = 'mp4';
      } catch (e2) {
        console.warn('WebCodecs failed, using WebM fallback:', e2);
        blob = await _mrBlob(frames, canvas, ctx, FPS,
          MediaRecorder.isTypeSupported('video/webm;codecs=vp9') ? 'video/webm;codecs=vp9' : 'video/webm');
        ext  = 'webm';
      }

    // Fallback — WebM
    } else {
      vidBtn.textContent = 'Encoding…';
      blob = await _mrBlob(frames, canvas, ctx, FPS,
        MediaRecorder.isTypeSupported('video/webm;codecs=vp9') ? 'video/webm;codecs=vp9' : 'video/webm');
      ext  = 'webm';
    }

    const a = Object.assign(document.createElement('a'), {
      download: `sama-${S.tpl}-${Date.now()}.${ext}`,
      href:     URL.createObjectURL(blob),
    });
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 8000);

  } catch (err) {
    if (document.body.contains(wrap)) document.body.removeChild(wrap);
    alert('Video export failed: ' + err.message);
    console.error(err);
  }
  vidBtn.disabled = false;
  vidBtn.textContent = '▶  Download Video (10s)';
}

// ── MediaRecorder encode helper ───────────────────────────
// Uses captureStream(FPS) so the browser captures at the correct frame rate.
// Frames are drawn at the right interval; a short tail delay flushes the last chunk.
function _mrBlob(frames, canvas, ctx, FPS, mimeType) {
  return new Promise((resolve, reject) => {
    const stream   = canvas.captureStream(FPS);
    const recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 8_000_000 });
    const chunks   = [];
    recorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
    recorder.onerror = e => reject(e.error || new Error('MediaRecorder error'));
    recorder.start(100);   // collect data every 100 ms for reliable chunking
    let idx = 0;
    const ms = Math.round(1000 / FPS);
    const iv = setInterval(() => {
      if (idx < frames.length) {
        ctx.drawImage(frames[idx++], 0, 0);
      } else {
        clearInterval(iv);
        setTimeout(() => recorder.stop(), ms * 3);  // let last frames flush
      }
    }, ms);
    recorder.onstop = () => resolve(new Blob(chunks, { type: mimeType }));
  });
}

// ── WebCodecs + mp4-muxer encode helper → H.264 MP4 ──────
async function _wcBlob(frames, tplDef, FPS, vidBtn) {
  // Loaded on demand — no extra cost at page load
  const { Muxer, ArrayBufferTarget } =
    await import('https://cdn.jsdelivr.net/npm/mp4-muxer/+esm');

  const target = new ArrayBufferTarget();
  const muxer  = new Muxer({
    target,
    video: { codec: 'avc', width: tplDef.w, height: tplDef.h },
    fastStart: 'in-memory',
  });

  // Pick best supported H.264 profile: High → Main → Baseline
  let codecStr;
  for (const c of ['avc1.640028', 'avc1.4d0028', 'avc1.42001f']) {
    try {
      const cfg = { codec: c, width: tplDef.w, height: tplDef.h, bitrate: 8_000_000, framerate: FPS };
      if ((await VideoEncoder.isConfigSupported(cfg)).supported) { codecStr = c; break; }
    } catch (_) {}
  }
  if (!codecStr) throw new Error('No H.264 codec available in this browser');

  const encoder = new VideoEncoder({
    output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
    error:  e => { throw e; },
  });
  encoder.configure({ codec: codecStr, width: tplDef.w, height: tplDef.h, bitrate: 8_000_000, framerate: FPS });

  for (let i = 0; i < frames.length; i++) {
    if (i % 5 === 0) vidBtn.textContent = `Encoding… ${Math.round((i / frames.length) * 100)}%`;
    const bm = await createImageBitmap(frames[i]);
    const vf = new VideoFrame(bm, { timestamp: Math.round(i * 1_000_000 / FPS), duration: Math.round(1_000_000 / FPS) });
    encoder.encode(vf, { keyFrame: i % (FPS * 2) === 0 });
    vf.close(); bm.close();
  }
  await encoder.flush();
  encoder.close();
  muxer.finalize();
  return new Blob([target.buffer], { type: 'video/mp4' });
}

// ── Download PNG ──────────────────────────────────────────
// Render an HTML string off-screen at the given width and capture it to a canvas.
async function _capturePNG(html, w) {
  const wrap = document.createElement('div');
  wrap.style.cssText = `position:fixed;left:-9999px;top:0;width:${w}px;overflow:hidden;z-index:-1`;
  wrap.innerHTML = html;
  document.body.appendChild(wrap);
  await document.fonts.ready;
  await new Promise(r => setTimeout(r, 200));
  const realH = (wrap.firstElementChild && wrap.firstElementChild.offsetHeight) || 0;
  wrap.style.height = realH + 'px';
  const canvas = await html2canvas(wrap, { scale:1, useCORS:true, allowTaint:false, width:w, height:realH, logging:false });
  document.body.removeChild(wrap);
  return canvas;
}

const CAL_MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const CAL_DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

// ── Mode switching ────────────────────────────────────

function updateCalendar() {
  const m = parseInt(document.getElementById('cal-month-sel').value  || 0);
  const y = parseInt(document.getElementById('cal-year-inp').value   || 2026);
  if (!isNaN(m) && !isNaN(y)) renderCalendar(y, m);
}

// ── Date helpers ──────────────────────────────────────
function daysInMonth(y, m) { return new Date(y, m + 1, 0).getDate(); }

// Returns the day-of-month (1-based) for the n-th occurrence (1=first) of weekday in month
function nthWeekday(y, m, wd, n) {
  let count = 0;
  for (let d = 1, dim = daysInMonth(y, m); d <= dim; d++) {
    if (new Date(y, m, d).getDay() === wd) { if (++count === n) return d; }
  }
  return null;
}

// Returns nearest weekday (Mon-Fri) at or after given day (clamped to month)
function toWeekday(y, m, day) {
  const dim = daysInMonth(y, m);
  for (let d = Math.max(1, day); d <= dim; d++) {
    const wd = new Date(y, m, d).getDay();
    if (wd > 0 && wd < 6) return d;
  }
  return null;
}

// Parse "Saturday, June 14th, 2026" → { year, month (0-based), day } or null
function parseEventDate(str) {
  if (!str) return null;
  const m = str.match(/(\w+)\s+(\d+)(?:st|nd|rd|th)?,\s+(\d{4})/);
  if (!m) {
    // fallback: "June 14th"
    const m2 = str.match(/(\w+)\s+(\d+)/);
    if (!m2) return null;
    const mo = CAL_MONTHS.findIndex(n => n.toLowerCase() === m2[1].toLowerCase());
    return mo === -1 ? null : { year: null, month: mo, day: parseInt(m2[2]) };
  }
  const mo = CAL_MONTHS.findIndex(n => n.toLowerCase() === m[1].toLowerCase());
  if (mo === -1) return null;
  return { year: parseInt(m[3]), month: mo, day: parseInt(m[2]) };
}

// Get events that fall in a specific year+month
function eventsInMonth(y, m) {
  return events.map(e => {
    const pd = parseEventDate(e.date);
    if (!pd) return null;
    if (pd.month !== m) return null;
    if (pd.year && pd.year !== y) return null;
    return { ...e, _day: pd.day };
  }).filter(Boolean).sort((a, b) => a._day - b._day);
}

// ── Custom key dates (user-entered per month) ────────
// Stored as "YYYY-M" → [{name, day, id}]
const calCustomEvents = {};
function calKey(y, m) { return y + '-' + m; }

// ── Editable schedules + persistence ─────────────────
// calSchedules holds ONLY months the user has edited ("dirty"): key → [{id,day,text,type}].
// Un-edited months are generated fresh each render so generator/events updates flow through.
const calSchedules = {};
let calRendered = [];     // working copy of the month currently on screen
let calRenderedKey = '';
let calUID = Date.now();
const CAL_LS = 'sama-cal-v1';

function persistCal() {
  try { localStorage.setItem(CAL_LS, JSON.stringify({ schedules: calSchedules, custom: calCustomEvents })); }
  catch (e) { /* storage unavailable — keep working in-memory */ }
}
function loadCal() {
  try {
    const d = JSON.parse(localStorage.getItem(CAL_LS) || '{}');
    if (d.schedules) Object.assign(calSchedules, d.schedules);
    if (d.custom)    Object.assign(calCustomEvents, d.custom);
  } catch (e) { /* ignore corrupt storage */ }
}

// Flatten generator output {day:[{text,type}]} into an editable [{id,day,text,type}] array.
function materializeSchedule(y, m) {
  const gen = generateSchedule(y, m);
  const arr = [];
  Object.keys(gen).map(Number).sort((a, b) => a - b).forEach(day => {
    gen[day].forEach(p => arr.push({ id: ++calUID, day, text: p.text, type: p.type }));
  });
  return arr;
}
// The array currently shown: stored copy if edited, else a fresh transient one.
function getRenderSchedule(y, m) {
  const k = calKey(y, m);
  return calSchedules[k] ? calSchedules[k] : materializeSchedule(y, m);
}
// Promote the on-screen month to an owned/persisted copy before mutating it.
function calMarkDirty() {
  if (!calSchedules[calRenderedKey]) calSchedules[calRenderedKey] = calRendered;
  persistCal();
}

function addCalCustomEvent() {
  const nameEl = document.getElementById('cal-custom-name');
  const dayEl  = document.getElementById('cal-custom-day');
  const name   = nameEl.value.trim();
  const day    = parseInt(dayEl.value);
  if (!name || isNaN(day) || day < 1 || day > 31) {
    nameEl.focus(); return;
  }
  const y = parseInt(document.getElementById('cal-year-inp').value);
  const m = parseInt(document.getElementById('cal-month-sel').value);
  const k = calKey(y, m);
  calCustomEvents[k] = calCustomEvents[k] || [];
  calCustomEvents[k].push({ name, day, id: Date.now() });
  // If this month is already edited, the generator won't re-run for it, so add the
  // key date's posts directly to the working copy to keep behavior intuitive.
  if (calSchedules[k] && k === calRenderedKey) {
    eventPosts(y, m, day, name).forEach(p => calRendered.push({ id: ++calUID, day: p.day, text: p.text, type: p.type }));
  }
  persistCal();
  nameEl.value = ''; dayEl.value = '';
  updateCalendar();
}

function removeCalCustomEvent(k, id) {
  if (calCustomEvents[k])
    calCustomEvents[k] = calCustomEvents[k].filter(e => e.id !== id);
  persistCal();
  updateCalendar();
}

// Discard manual edits for the visible month and rebuild from events/recurring rules.
function regenerateSchedule() {
  if (calSchedules[calRenderedKey]) {
    delete calSchedules[calRenderedKey];
    persistCal();
  }
  updateCalendar();
}

// ── Drag-and-drop posts between days ──────────────────
let calDragId = null;
function calDragStart(e, id) {
  calDragId = id;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', String(id));
  e.target.classList.add('cal-dragging');
}
function calDragEnd(e) {
  e.target.classList.remove('cal-dragging');
  document.querySelectorAll('.cal-cell-drop').forEach(c => c.classList.remove('cal-cell-drop'));
}
function calDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('cal-cell-drop');
}
function calDragLeave(e) {
  e.currentTarget.classList.remove('cal-cell-drop');
}
function calDrop(e, day) {
  e.preventDefault();
  e.currentTarget.classList.remove('cal-cell-drop');
  let id = calDragId;
  if (id == null) id = parseInt(e.dataTransfer.getData('text/plain'));
  calDragId = null;
  if (id == null || isNaN(id)) return;
  const p = calRendered.find(p => p.id === id);
  if (!p || p.day === day) return;
  calMarkDirty();
  p.day = day;
  persistCal();
  updateCalendar();
}

// ── Post editor ──────────────────────────────────────
let calEditId = null;   // id of post being edited, or null when adding new
function calOpenEditor(id, day) {
  calEditId = id;
  const post = id != null ? calRendered.find(p => p.id === id) : null;
  document.getElementById('cal-edit-title').textContent = post ? 'Edit Post' : 'Add Post';
  document.getElementById('cal-edit-text').value = post ? post.text : '';
  document.getElementById('cal-edit-day').value  = post ? post.day : (day || 1);
  document.getElementById('cal-edit-type').innerHTML = Object.entries(PTYPES).map(([k, v]) =>
    `<option value="${k}" ${post && post.type === k ? 'selected' : (!post && k === 'post' ? 'selected' : '')}>${v.label}</option>`
  ).join('');
  document.getElementById('cal-edit-del').style.display = post ? '' : 'none';
  document.getElementById('cal-edit-modal').classList.add('open');
  setTimeout(() => document.getElementById('cal-edit-text').focus(), 30);
}
function calEditCancel() { document.getElementById('cal-edit-modal').classList.remove('open'); }
function calEditSave() {
  const text = document.getElementById('cal-edit-text').value.trim();
  const type = document.getElementById('cal-edit-type').value;
  const dim  = daysInMonth(...calRenderedKey.split('-').map(Number));
  let day    = parseInt(document.getElementById('cal-edit-day').value);
  if (isNaN(day) || day < 1) day = 1;
  if (day > dim) day = dim;
  if (!text) { document.getElementById('cal-edit-text').focus(); return; }
  calMarkDirty();
  if (calEditId != null) {
    const p = calRendered.find(p => p.id === calEditId);
    if (p) { p.text = text; p.type = type; p.day = day; }
  } else {
    calRendered.push({ id: ++calUID, day, text, type });
  }
  persistCal();
  calEditCancel();
  updateCalendar();
}
function calEditDelete() {
  if (calEditId == null) { calEditCancel(); return; }
  calMarkDirty();
  const i = calRendered.findIndex(p => p.id === calEditId);
  if (i >= 0) calRendered.splice(i, 1);
  persistCal();
  calEditCancel();
  updateCalendar();
}

// ── Schedule generator ────────────────────────────────
function generateSchedule(y, m) {
  const out = {};   // day → [{text, type}]
  const dim = daysInMonth(y, m);
  const add = (day, text, type) => {
    day = Math.round(day);
    if (!day || day < 1 || day > dim) return;
    (out[day] = out[day] || []).push({ text, type });
  };

  const monthName = CAL_MONTHS[m];
  const instrName = instructors.length
    ? instructors[(m + y) % instructors.length].name.split(' ')[0]
    : 'Teacher';

  // ── Recurring content ──────────────────────────────
  // Rebekah monthly reel — always day 1 of the month
  add(1, `Rebekah ${monthName} Reel`, 'reel');

  // Rebekah's Tips — first Wed
  const fWed = nthWeekday(y, m, 3, 1);
  if (fWed) add(fWed, "Rebekah's Tips", 'carousel');

  // Students/studio — 3rd Mon
  const sMon3 = nthWeekday(y, m, 1, 3);
  if (sMon3) add(sMon3, 'Students/studio', 'carousel');

  // Pose highlight — 3rd Wed
  const sWed3 = nthWeekday(y, m, 3, 3);
  if (sWed3) add(sWed3, 'Pose highlight connecting to theme', 'carousel');

  // Teacher Q&A — 2nd Tue
  const sTue2 = nthWeekday(y, m, 2, 2);
  if (sTue2) add(sTue2, instrName + ' Q&A', 'carousel');

  // Second Rebekah reel — 4th Mon (mid-month casual)
  const sMon4 = nthWeekday(y, m, 1, 4);
  if (sMon4) {
    const midLabels = [
      'Rebekah Q&A Reel',
      'Founder Series Reel',
      'Behind-the-Scenes Reel',
      'Monthly Theme Reel',
    ];
    add(sMon4, midLabels[m % midLabels.length], 'reel');
  }

  // ── Events this month ──────────────────────────────
  const thisMonth = eventsInMonth(y, m);
  thisMonth.forEach(ev => {
    const ed   = ev._day;
    // Announcement: ~10 days before (weekday)
    const aDayRaw = ed - 10;
    if (aDayRaw >= 1) {
      const aDay = toWeekday(y, m, aDayRaw);
      if (aDay) add(aDay, ev.title, 'carousel');
    }

    // "This weekend" / reminder: 2 days before (or Fri if event on Sat/Sun)
    const ewd = new Date(y, m, ed).getDay();
    const remDay = (ewd === 6) ? ed - 1 : (ewd === 0) ? ed - 2 : ed - 2;
    if (remDay >= 1 && remDay < ed) {
      const rLabel = (ed - remDay === 1) ? ev.title + ' tomorrow' : ev.title + ' this weekend';
      add(remDay, rLabel, 'story');
    }
  });

  // ── Next month's events (teasers in last week) ──────
  const nm = (m + 1) % 12;
  const ny = m === 11 ? y + 1 : y;
  const nextMonth = eventsInMonth(ny, nm);
  // Find last Fri of current month
  let lastFri = null;
  for (let d = dim; d >= 1; d--) { if (new Date(y, m, d).getDay() === 5) { lastFri = d; break; } }
  const teaseCandidates = nextMonth.filter(ev => ev._day <= 18);
  teaseCandidates.slice(0, 2).forEach((ev, i) => {
    const tDay = lastFri ? lastFri - i * 3 : dim - i * 3;
    add(tDay, `${ev.title} — ${nm + 1}/${ev._day}`, 'reel');
  });

  // January special
  if (m === 0) add(1, 'Happy New Year from Sama', 'carousel');

  // ── Custom key dates added by user ─────────────────
  const customEvs = calCustomEvents[calKey(y, m)] || [];
  customEvs.forEach(ev => {
    eventPosts(y, m, ev.day, ev.name).forEach(p => add(p.day, p.text, p.type));
  });

  return out;
}

// Announcement (~10 days before) + reminder (2 days before) posts for a dated
// event. Shared by the generator and by adding a key date to an edited month.
function eventPosts(y, m, day, label) {
  const dim = daysInMonth(y, m);
  const ed  = Math.min(day, dim);
  const posts = [];
  const aDayRaw = ed - 10;
  if (aDayRaw >= 1) {
    const aDay = toWeekday(y, m, aDayRaw);
    if (aDay) posts.push({ day: aDay, text: label, type: 'carousel' });
  }
  const ewd = new Date(y, m, ed).getDay();
  const remDay = (ewd === 6) ? ed - 1 : ed - 2;
  if (remDay >= 1 && remDay < ed) {
    const rLabel = (ed - remDay === 1) ? label + ' tomorrow' : label + ' this weekend';
    posts.push({ day: remDay, text: rLabel, type: 'story' });
  }
  return posts;
}

// ── Calendar renderer ─────────────────────────────────
function renderCalendar(y, m) {
  // Editable working copy for this month (stored if edited, fresh otherwise).
  calRenderedKey = calKey(y, m);
  calRendered = getRenderSchedule(y, m);
  const schedule = {};
  calRendered.forEach(p => { (schedule[p.day] = schedule[p.day] || []).push(p); });
  const thisMonthEvs = eventsInMonth(y, m);
  const dim       = daysInMonth(y, m);
  const firstWd   = new Date(y, m, 1).getDay();      // weekday of day-1
  const prevDim   = daysInMonth(m === 0 ? y - 1 : y, m === 0 ? 11 : m - 1);
  const totalCells= Math.ceil((firstWd + dim) / 7) * 7;

  // ── Header ────────────────────────────────────────
  document.getElementById('cal-hdr-m').textContent = CAL_MONTHS[m];
  document.getElementById('cal-hdr-y').textContent = y;

  // ── Left column ───────────────────────────────────
  const keyRows = thisMonthEvs.length
    ? thisMonthEvs.map(ev => `<div class="cal-left-event"><strong>${CAL_MONTHS[m].slice(0,3)} ${ev._day}:</strong> ${ev.title}${ev.time ? '<br><span style="color:#888">' + ev.time + '</span>' : ''}</div>`).join('')
    : '<div class="cal-left-event" style="color:#bbb">No events this month</div>';

  const legendRows = Object.entries(PTYPES).map(([k, v]) =>
    `<div class="cal-legend-chip" style="background:${v.bg};color:${v.color}">${v.label}</div>`
  ).join('');

  document.getElementById('cal-left-col').innerHTML = `
    <div class="cal-left-heading">Key Dates/Events</div>
    ${keyRows}
    <hr class="cal-left-divider">
    <div class="cal-platform-label">Platform</div>
    ${legendRows}
  `;

  // ── Sidebar key dates panel ──────────────────────────
  const customs = calCustomEvents[calKey(y, m)] || [];
  // Render custom events list
  document.getElementById('cal-custom-list').innerHTML = customs.length
    ? customs.map(ev =>
        `<div class="cal-custom-item">
           <span class="cal-custom-item-day">${ev.day}</span>
           <span class="cal-custom-item-text">${ev.name}</span>
           <button class="cal-custom-del" onclick="removeCalCustomEvent('${calKey(y,m)}',${ev.id})" title="Remove">✕</button>
         </div>`
      ).join('')
    : '<div style="font-size:10.5px;color:#ccc;margin-bottom:4px">None added yet</div>';

  // Build combined key-dates list (website events + custom)
  const allKeyDates = [
    ...thisMonthEvs.map(ev => ({ day: ev._day, text: ev.title, sub: ev.time || '' })),
    ...customs.map(ev => ({ day: ev.day, text: ev.name, sub: '' })),
  ].sort((a, b) => a.day - b.day);

  document.getElementById('cal-key-sidebar').innerHTML = `
    <span class="cal-sb-heading">Key Dates/Events</span>
    ${allKeyDates.length
      ? allKeyDates.map(kd => `<div class="cal-sb-event">
          <strong>${CAL_MONTHS[m].slice(0,3)} ${kd.day}:</strong> ${kd.text}
          ${kd.sub ? '<br><span style="color:#aaa">'+kd.sub+'</span>' : ''}
        </div>`).join('')
      : '<div class="cal-sb-event" style="color:#bbb">No events this month</div>'}
    <div class="cal-sb-legend">
      <span class="cal-sb-heading">Platform</span>
      ${Object.entries(PTYPES).map(([k,v]) =>
        `<span class="cal-sb-chip" style="background:${v.bg};color:${v.color}">${v.label}</span>`
      ).join('')}
    </div>
  `;

  // ── Grid ──────────────────────────────────────────
  const colHeaders = CAL_DAYS.map(d =>
    `<div class="cal-col-hdr">${d}</div>`
  ).join('');

  let cells = '';
  // Prev-month filler
  for (let i = 0; i < firstWd; i++) {
    const d = prevDim - (firstWd - 1 - i);
    cells += `<div class="cal-cell"><span class="cal-cell-num dim">${d}</span></div>`;
  }
  // This month
  for (let d = 1; d <= dim; d++) {
    const posts = schedule[d] || [];
    const chips = posts.map(p => {
      const t = PTYPES[p.type] || PTYPES.post;
      return `<span class="cal-chip" style="background:${t.bg};color:${t.color}" draggable="true" ondragstart="calDragStart(event,${p.id})" ondragend="calDragEnd(event)" onclick="calOpenEditor(${p.id})" title="Drag to move · click to edit">${x(p.text)}</span>`;
    }).join('');
    const addBtn = `<button class="cal-add" onclick="calOpenEditor(null,${d})" title="Add a post">+</button>`;
    cells += `<div class="cal-cell" data-day="${d}" ondragover="calDragOver(event)" ondragleave="calDragLeave(event)" ondrop="calDrop(event,${d})"><span class="cal-cell-num">${d}</span>${chips}${addBtn}</div>`;
  }
  // Next-month filler
  let nd = 1;
  for (let i = firstWd + dim; i < totalCells; i++, nd++) {
    cells += `<div class="cal-cell"><span class="cal-cell-num dim">${nd}</span></div>`;
  }

  document.getElementById('cal-grid').innerHTML = colHeaders + cells;
}

// ── Calendar PNG download ─────────────────────────────
async function downloadCalendar() {
  const btn = event.target;
  btn.disabled = true; btn.textContent = 'Generating…';
  const node = document.getElementById('cal-canvas');
  try {
    node.classList.add('cal-exporting');   // hide + buttons / edit outlines in the PNG
    const canvas = await html2canvas(node, {
      scale: 2, useCORS: true, allowTaint: false, logging: false,
      backgroundColor: '#ffffff',
    });
    const a = document.createElement('a');
    a.download = `sama-calendar-${document.getElementById('cal-hdr-m').textContent}-${document.getElementById('cal-hdr-y').textContent}.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
  } catch (err) { alert('Download failed: ' + err.message); }
  node.classList.remove('cal-exporting');
  btn.disabled = false; btn.textContent = '⬇\xa0 Download Calendar PNG';
}

// Initialise month selector to current month + restore saved calendar edits
(function initCalSelector() {
  loadCal();
  const sel = document.getElementById('cal-month-sel');
  if (sel) sel.value = new Date().getMonth();
  const yInp = document.getElementById('cal-year-inp');
  if (yInp) yInp.value = new Date().getFullYear();
})();

</script>
