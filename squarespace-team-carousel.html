<!-- Paste this code into a Squarespace Code Block or Page Header Code Injection -->

<style>
  .sama-teachers-section {
    padding: 10px 0;
    position: relative;
  }

  .sama-teachers-section__title {
    color: #333;
    font-size: 3rem;
    font-weight: 600;
    text-transform: lowercase;
    margin-bottom: 20px;
    padding-left: 30px;
    letter-spacing: -0.02em;
  }

  .sama-teachers-section__title--right {
    text-align: right;
    padding-right: 30px;
    padding-left: 0;
  }

  .sama-carousel-container {
    position: relative;
    overflow: hidden;
  }

  .sama-teachers-carousel {
    display: flex;
    gap: 30px;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 0 30px 20px 30px;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    scroll-padding-left: 30px;
    scroll-snap-type: x mandatory;
  }

  .sama-teacher-card {
    scroll-snap-align: start;
  }

  .sama-teachers-carousel::-webkit-scrollbar {
    display: none;
  }

  .sama-carousel-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(194, 24, 91, 0.3);
    border: none;
    width: 64px;
    height: 64px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: all 0.3s ease;
  }

  .sama-carousel-arrow:hover {
    background: rgba(194, 24, 91, 0.5);
    transform: translateY(-50%) scale(1.05);
  }

  .sama-carousel-arrow--left {
    left: 30px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }

  .sama-carousel-arrow--left.visible {
    opacity: 1;
    pointer-events: auto;
  }

  .sama-carousel-arrow--right {
    right: 30px;
  }

  .sama-carousel-arrow svg {
    width: 40px;
    height: 40px;
    stroke: white;
    stroke-width: 1.5;
    fill: none;
  }

  .sama-teacher-card {
    flex-shrink: 0;
    width: 240px;
    display: flex;
    flex-direction: column;
    cursor: pointer;
    scroll-snap-align: start;
  }

  .sama-teacher-card__image-wrapper {
    position: relative;
    width: 240px;
    height: 305px;
    margin-bottom: 0;
    overflow: hidden;
  }

  .sama-teacher-card__image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center center;
    filter: grayscale(100%);
    transition: transform 0.3s ease;
  }

  .sama-teacher-card__image[alt="Zach"],
  .sama-teacher-card__image[alt="Sarah"],
  .sama-teacher-card__image[alt="Amy"],
  .sama-teacher-card__image[alt="Megan"] {
    object-position: center top;
  }

  .sama-teacher-card__overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: rgba(0, 0, 0, 0);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background-color 0.3s ease;
    pointer-events: none;
  }

  .sama-teacher-card__plus {
    font-size: 48px;
    color: white;
    opacity: 0;
    transition: opacity 0.3s ease;
    font-weight: 300;
    line-height: 1;
  }

  .sama-teacher-card:hover .sama-teacher-card__overlay {
    background-color: rgba(0, 0, 0, 0.5);
  }

  .sama-teacher-card:hover .sama-teacher-card__plus {
    opacity: 1;
  }

  .sama-teacher-card__name {
    color: #333;
    font-size: 1.25rem;
    font-weight: 500;
    margin-top: 4px;
    margin-bottom: 0;
    letter-spacing: 0.01em;
  }

  /* Teacher Modal */
  .sama-teacher-modal {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: rgba(0, 0, 0, 0.9);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999999 !important;
    padding: 30px;
  }

  .sama-teacher-modal.active {
    display: flex;
  }

  .sama-teacher-modal__content {
    max-width: 900px;
    width: 100%;
    max-height: 85vh;
    position: relative;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    gap: 20px;
    z-index: 9999999 !important;
  }

  .sama-teacher-modal__close {
    position: fixed;
    top: 60px;
    right: 60px;
    background: none;
    border: none;
    font-size: 48px;
    cursor: pointer;
    color: white;
    line-height: 1;
    padding: 0;
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10000000 !important;
    transition: opacity 0.3s ease;
  }

  .sama-teacher-modal__close:hover {
    opacity: 0.7;
  }

  .sama-teacher-modal__image {
    width: 100%;
    height: auto;
    aspect-ratio: 290 / 368;
    object-fit: cover;
    filter: grayscale(100%);
    display: block;
  }

  .sama-teacher-modal__image-container {
    max-width: 290px;
    margin: 0 auto;
    background-color: white;
  }

  .sama-teacher-modal__body {
    background-color: white;
    padding: 25px 40px;
    flex: 1;
    overflow-y: auto;
  }

  .sama-teacher-modal__name {
    font-size: 1.875rem;
    font-weight: 600;
    margin-top: 0;
    margin-bottom: 15px;
    color: #333;
  }

  .sama-teacher-modal__bio {
    font-size: 1rem;
    line-height: 1.6;
    color: #666;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .sama-teachers-section__title {
      font-size: 2rem;
      padding-left: 30px;
    }

    .sama-teachers-section__title--right {
      padding-right: 30px;
    }

    .sama-teachers-carousel {
      padding: 0 30px 20px 30px;
    }

    .sama-teacher-modal__body {
      padding: 30px;
    }

    .sama-teacher-modal__close {
      top: 20px;
      right: 20px;
    }
  }
</style>

<script>
  // Teacher data with exact bios
  const samaTeacherData = {
    'Allie': { bio: 'Allie Muzzio is a licensed Occupational Therapist and registered yoga teacher, completing both the 200-Hour Yoga Teacher Training and Kids Yoga Teacher Training at Sama Academy. She holds a Master\'s degree in Occupational Therapy with a minor in Psychology, integrating evidence-based OT principles with nervous system support, functional movement, and embodied awareness.\n\nWith specialized training in Pediatric Yoga & Mindfulness, Allie guides students of all ages in developing tools for safety, confidence, and self-regulation—both on and off the mat. Her approach blends therapeutic insight with accessible movement and breath awareness, helping students meet themselves with curiosity and kindness. She looks forward to supporting you here at Sama!' },
    'Amber': { bio: 'Amber is thrilled to be with you. She is a New Canaan resident, native of the Netherlands, mom of 3, avid learner and proud graduate of Sama Academy\'s 200 hr Yoga Teacher Training Program. Amber\'s signature classes offer steady and easeful sequences to set you on your wonderful day ahead. Welcome to Sama!' },
    'Amy': { bio: 'Amy is a leader in our community, serving as art educator and lead at a private school in Greenwich. She is a graduate of Sama Yoga Academy\'s YTT-200-hour and Restorative Teacher Training programs and a mentor for Sama Academy. Amy\'s experience and steady presence guide us into harmony.\n\nIn 2020 Amy founded bilden farmacy, hand-poured candles available here at Sama that offer rituals from the mat to your home. She is an artist, art educator and marathon runner and can not wait to welcome you.' },
    'Denise': { bio: 'After a career in Finance and 10 years abroad, Denise and her family settled in Darien, CT. She was an avid Sama student and developed into a proud graduate of Sama Yoga Academy\'s 200 Hour YTT, Sama\'s 30 Hour Kids and Sama\'s 25 Hour Restorative YTT. She dedicates some of her time to volunteering including the Norwalk Grassroots Tennis & Education Center.\n\nShe loves her family dog walks, neighborhood runs, friendly tennis matches and time on her mat. Denise believes that one secret to maintaining an active lifestyle is finding a little time to slow down. She invites you to come to your mat, take a breath and move mindfully so you are energized ready for your day.' },
    'Mary': { bio: 'Mary has been practicing yoga for over fifteen years, and is proud to be a graduate of Sama Academy\'s Yoga Teacher Training. She is mother of six-year-old twins.\n\nShe currently leads partnerships for Thirty Madison, a platform increasing access to virtual specialized healthcare. Prior to Thirty Madison, Mary led strategy and growth initiatives for the non-profit DoSomething.org, as well as at mission-driven tech startups Andela and ZocDoc. Mary graduated Magna Cum Laude from Fordham University, where she studied International Political Economy and Peace & Justice Studies.' },
    'Missy': { bio: 'Missy has been practicing yoga since her 20\'s, achieved her goal to become a teacher and is a graduate of Sama Yoga Academy\'s 200 Hour YTT. She balances her time being both a Digital Ad Agency executive and a yoga teacher.\n\nMissy lives in Ridgefield with her two teenage daughters, English husband and two dogs. She is passionate about yoga, tennis, pickleball and refining her sourdough skills! Her classes guide us to build strength, awareness and harmony from our bones to our brain.' },
    'Sara': { bio: 'Sara is a proud graduate of Sama Yoga Academy\'s 200 hr YTT, and Savannah College of Art and Design with a major in fashion design. She works as a sewing and crafting teacher in Darien and Greenwich, designs clothes, knits and crochets in her free time.' },
    'Sarah': { bio: 'Sarah began practicing yoga over 7 years ago in search of balance, harmony, and inner strength, and immediately fell in love. As a graduate of Sama Yoga Academy\'s 200-hour Yoga Teacher Training, she seeks to offer the support and steady easefulness that yoga has brought to her life in every one of her classes.\n\nOutside the studio, Sarah bounces between Norwalk and New York City working in book publishing and fills her free time with long runs, crochet projects, and matcha lattes. She is a cat mom and dog walking volunteer at a local shelter and will always say yes to seeing a picture of your pet.\n\nSarah invites you to leave your day at the door and join her on the mat for an hour of blissful unplugging, joyful movement, and the occasional fiery flow.' },
    'Tamara': { bio: 'Tamara is honored to have completed Sama\'s 200-hour YTT and Restorative Yoga Program has been practicing yoga for over 30 years. With a background in personal training and group fitness, she has explored many movement modalities—but yoga has always been her true home.\n\nShe is passionate about helping others feel strong, supported, and empowered at every stage of life. Tamara is excited to share the joy, curiosity, and connection that yoga brings—both on and off the mat. Welcome!' },
    'Zach': { bio: 'Graduate of Sama Academy\'s YTT-200-hour and Children\'s Teacher Training. With a Masters in educational psychology and undergrad in Human Development and Family Science, Zach is passionate about every human being being heard and seen, He is a graduate of Sama Yoga Academy\'s 200 hr YTT program and is currently an elementary school teacher in Bridgeport, CT. Through his mindful flows and innate kindness, Zach shares that he started yoga as an adult and is eager to meet you where you are.' },
    'Anna': { bio: 'Anna earned her RYT-200 hour teaching certification from Sama Yoga Academy\'s Teacher Training. On the side, she holds an MBA, a B.S. in Marketing and a B.A. in German; Anna works in consumer behavior and branding functions.\n\nAnna\'s upbeat spirit and classes lift us up! "Movement, mindfulness, strength, and stretch are Sama\'s recipe for joy!" Join her in flow!' },
    'Caroline': { bio: 'Caroline is passionate about the benefits of slowing down and connecting to inner calm through the practice of yoga. She holds a B.S. in Educational Studies from Colgate University and a MAT in Early Childhood Education from Manhattanville College. In 2019, she completed her 200-hour YTT.\n\nHere at Sama, she obtained her Kids Yoga Certification and Restorative Yoga Certification. Caroline is a Grade 3 teacher at New Canaan Country School and the Director of the Sama Kids Program.' },

  // Open teacher modal
  function samaOpenTeacherModal(name, imageSrc) {
    const modal = document.getElementById('samaTeacherModal');
    const modalImage = document.getElementById('samaModalImage');
    const modalName = document.getElementById('samaModalName');
    const modalBio = document.getElementById('samaModalBio');

    modalImage.src = imageSrc;
    modalImage.alt = name;
    modalName.textContent = name;
    modalBio.textContent = samaTeacherData[name]?.bio || 'Add bio here...';

    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  // Close teacher modal
  function samaCloseTeacherModal() {
    const modal = document.getElementById('samaTeacherModal');
    modal.classList.remove('active');
    document.body.style.overflow = '';
  }

  // Close modal when clicking outside
  document.getElementById('samaTeacherModal').addEventListener('click', function(e) {
    if (e.target === this) {
      samaCloseTeacherModal();
    }
  });

  function samaUpdateArrowVisibility(carouselId) {
    const carousel = document.getElementById('sama-' + carouselId + '-carousel');
    const leftArrow = carousel.parentElement.querySelector('.sama-carousel-arrow--left');
    const rightArrow = carousel.parentElement.querySelector('.sama-carousel-arrow--right');
    const maxScroll = carousel.scrollWidth - carousel.clientWidth;

    // Show left arrow if scrolled away from start (accounting for 30px padding)
    if (carousel.scrollLeft > 35) {
      leftArrow.classList.add('visible');
    } else {
      leftArrow.classList.remove('visible');
    }

    // Hide right arrow if at the end
    if (carousel.scrollLeft >= maxScroll - 10) {
      rightArrow.style.opacity = '0';
      rightArrow.style.pointerEvents = 'none';
    } else {
      rightArrow.style.opacity = '1';
      rightArrow.style.pointerEvents = 'auto';
    }
  }

  function samaScrollCarousel(carouselId, direction) {
    const carousel = document.getElementById('sama-' + carouselId + '-carousel');
    const cardWidth = 240; // Width of teacher card
    const gap = 30; // Gap between cards
    const scrollAmount = cardWidth + gap;

    // Scroll the carousel
    carousel.scrollBy({
      left: direction * scrollAmount,
      behavior: 'smooth'
    });

    // Update arrow visibility after scroll
    setTimeout(() => {
      samaUpdateArrowVisibility(carouselId);
    }, 300);
  }

  // Initialize when DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', samaInitCarousel);
  } else {
    samaInitCarousel();
  }

  function samaInitCarousel() {
    // Move modal to body to escape Squarespace section stacking context
    const modal = document.getElementById('samaTeacherModal');
    if (modal && modal.parentElement.tagName !== 'BODY') {
      document.body.appendChild(modal);
    }

    // Add click handlers to teacher cards
    document.querySelectorAll('.sama-teacher-card').forEach(card => {
      card.addEventListener('click', function() {
        const name = this.querySelector('.sama-teacher-card__name').textContent;
        const imageSrc = this.querySelector('.sama-teacher-card__image').src;
        samaOpenTeacherModal(name, imageSrc);
      });
    });

    // Add scroll listeners to update arrow visibility
    const weeklyCarousel = document.getElementById('sama-weekly-carousel');
    const subsCarousel = document.getElementById('sama-subs-carousel');

    if (weeklyCarousel) {
      weeklyCarousel.addEventListener('scroll', () => {
        samaUpdateArrowVisibility('weekly');
      });
    }

    if (subsCarousel) {
      subsCarousel.addEventListener('scroll', () => {
        samaUpdateArrowVisibility('subs');
      });
    }

    // Set initial arrow visibility
    setTimeout(() => {
      samaUpdateArrowVisibility('weekly');
      samaUpdateArrowVisibility('subs');
    }, 100);
  }
</script>
