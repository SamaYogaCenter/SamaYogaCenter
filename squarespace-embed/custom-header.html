<!-- SAMA YOGA - CUSTOM HEADER WITH DROPDOWN NAVIGATION -->
<!-- This code can be embedded into Squarespace Header Code Injection -->
<!-- NOTE: You may need to hide the default Squarespace navigation and use this instead -->

<style>
/* Sama Yoga Header Styles */
.sama-header {
  position: sticky;
  top: 0;
  z-index: 1000;
  background-color: #ffffff;
  border-bottom: 1px solid #f0f0f0;
  transition: all 0.3s ease;
}

.sama-header--scrolled {
  box-shadow: 0 4px 6px rgba(0, 0, 0, 0.07);
}

.sama-header__container {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.5rem 2rem;
  max-width: 1200px;
  margin: 0 auto;
  transition: padding 0.3s ease;
}

.sama-header--scrolled .sama-header__container {
  padding: 0.5rem 2rem;
}

.sama-header__logo img {
  height: 60px;
  width: auto;
  transition: height 0.3s ease;
}

.sama-header--scrolled .sama-header__logo img {
  height: 40px;
}

.sama-nav__list {
  display: flex;
  align-items: center;
  gap: 1.5rem;
  list-style: none;
  margin: 0;
  padding: 0;
}

.sama-nav__item {
  position: relative;
}

.sama-nav__link {
  display: block;
  font-size: 1rem;
  font-weight: 500;
  color: #0a0a0a;
  transition: color 0.3s ease;
  text-decoration: none;
  padding: 0.5rem 0;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.sama-nav__link:hover {
  color: #c2185b;
}

.sama-nav__link--dropdown {
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 0.25rem;
}

.sama-nav__link--dropdown::after {
  content: '▾';
  font-size: 0.75em;
  transition: transform 0.25s ease;
}

.sama-nav__item--has-dropdown:hover .sama-nav__link--dropdown::after {
  transform: rotate(180deg);
}

.sama-nav__dropdown {
  position: absolute;
  top: 100%;
  left: 0;
  background-color: #ffffff;
  border: 1px solid #f0f0f0;
  border-radius: 8px;
  box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
  min-width: 200px;
  opacity: 0;
  visibility: hidden;
  transform: translateY(-10px);
  transition: all 0.25s ease;
  margin-top: 0.5rem;
}

.sama-nav__item--has-dropdown:hover .sama-nav__dropdown {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
}

.sama-nav__dropdown-link {
  display: block;
  padding: 0.75rem 1rem;
  font-size: 0.8rem;
  color: #0a0a0a;
  transition: all 0.15s ease;
  border-bottom: 1px solid #f0f0f0;
  text-transform: uppercase;
  text-decoration: none;
  white-space: nowrap;
}

.sama-nav__dropdown-link:last-child {
  border-bottom: none;
}

.sama-nav__dropdown-link:hover {
  background-color: #fafafa;
  color: #c2185b;
  padding-left: 1.5rem;
}

.sama-header__cta {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0.75rem 1.5rem;
  font-size: 0.9rem;
  font-weight: 500;
  border-radius: 8px;
  background-color: #c2185b;
  color: white;
  text-decoration: none;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  transition: all 0.25s ease;
}

.sama-header__cta:hover {
  background-color: #880e4f;
  transform: translateY(-2px);
  box-shadow: 0 4px 6px rgba(0, 0, 0, 0.15);
}

.sama-menu-toggle {
  display: none;
  flex-direction: column;
  gap: 4px;
  padding: 0.5rem;
  cursor: pointer;
  background: none;
  border: none;
}

.sama-menu-toggle__line {
  width: 24px;
  height: 3px;
  background-color: #0a0a0a;
  border-radius: 9999px;
  transition: all 0.25s ease;
}

/* Mobile Styles */
@media (max-width: 768px) {
  .sama-header__container {
    padding: 1rem;
  }

  .sama-nav {
    position: fixed;
    top: 73px;
    left: 0;
    right: 0;
    background-color: #ffffff;
    border-bottom: 1px solid #f0f0f0;
    max-height: 0;
    overflow-y: auto;
    transition: max-height 0.35s ease;
    box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
  }

  .sama-nav--open {
    max-height: calc(100vh - 73px);
  }

  .sama-nav__list {
    flex-direction: column;
    align-items: stretch;
    gap: 0;
    padding: 0.75rem;
  }

  .sama-nav__item {
    border-bottom: 1px solid #f0f0f0;
  }

  .sama-nav__link {
    display: block;
    padding: 0.75rem;
  }

  .sama-nav__dropdown {
    position: static;
    opacity: 1;
    visibility: visible;
    transform: none;
    border: none;
    border-radius: 0;
    box-shadow: none;
    margin-top: 0;
    background-color: #fafafa;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.25s ease;
  }

  .sama-nav__item--has-dropdown.sama-nav__item--open .sama-nav__dropdown {
    max-height: 500px;
  }

  .sama-nav__dropdown-link {
    padding: 0.5rem 1.5rem;
    font-size: 0.8rem;
    border-bottom: none;
  }

  .sama-menu-toggle {
    display: flex;
  }

  .sama-menu-toggle--active .sama-menu-toggle__line:nth-child(1) {
    transform: rotate(45deg) translateY(7px);
  }

  .sama-menu-toggle--active .sama-menu-toggle__line:nth-child(2) {
    opacity: 0;
  }

  .sama-menu-toggle--active .sama-menu-toggle__line:nth-child(3) {
    transform: rotate(-45deg) translateY(-7px);
  }

  .sama-header__cta-desktop {
    display: none;
  }
}

@media (min-width: 769px) {
  .sama-header__cta-mobile {
    display: none;
  }
}
</style>

<header class="sama-header" id="samaHeader">
  <div class="sama-header__container">
    <a href="/" class="sama-header__logo">
      <img src="/path-to-your-logo/sama-yoga-logo.png" alt="Sama Yoga Center">
    </a>

    <nav class="sama-nav" id="samaNav">
      <ul class="sama-nav__list">
        <!-- Classes with dropdown -->
        <li class="sama-nav__item sama-nav__item--has-dropdown">
          <span class="sama-nav__link sama-nav__link--dropdown">Classes</span>
          <ul class="sama-nav__dropdown">
            <li><a href="/schedule" class="sama-nav__dropdown-link">Class Schedule</a></li>
            <li><a href="/classes" class="sama-nav__dropdown-link">Class Descriptions</a></li>
            <li><a href="/private-sessions" class="sama-nav__dropdown-link">Private Sessions</a></li>
            <li><a href="/kids-classes" class="sama-nav__dropdown-link">Sama Kids</a></li>
          </ul>
        </li>

        <li class="sama-nav__item">
          <a href="/pricing" class="sama-nav__link">Pricing</a>
        </li>

        <li class="sama-nav__item">
          <a href="/events" class="sama-nav__link">Events</a>
        </li>

        <li class="sama-nav__item">
          <a href="/teacher-training" class="sama-nav__link">Teacher Training</a>
        </li>

        <li class="sama-nav__item">
          <a href="/team" class="sama-nav__link">Our Team</a>
        </li>

        <!-- Mobile CTA -->
        <li class="sama-nav__item sama-header__cta-mobile">
          <a href="/schedule" class="sama-header__cta" style="width: 100%;">Book a Class</a>
        </li>
      </ul>
    </nav>

    <div style="display: flex; gap: 0.75rem; align-items: center;">
      <a href="/schedule" class="sama-header__cta sama-header__cta-desktop">Book a Class</a>
      <button class="sama-menu-toggle" id="samaMenuToggle" aria-label="Toggle menu">
        <span class="sama-menu-toggle__line"></span>
        <span class="sama-menu-toggle__line"></span>
        <span class="sama-menu-toggle__line"></span>
      </button>
    </div>
  </div>
</header>

<script>
// Sama Yoga Navigation JavaScript
(function() {
  const menuToggle = document.getElementById('samaMenuToggle');
  const nav = document.getElementById('samaNav');
  const header = document.getElementById('samaHeader');

  // Mobile menu toggle
  if (menuToggle && nav) {
    menuToggle.addEventListener('click', function() {
      nav.classList.toggle('sama-nav--open');
      menuToggle.classList.toggle('sama-menu-toggle--active');
    });

    // Close menu when clicking a link (mobile)
    const navLinks = nav.querySelectorAll('.sama-nav__link:not(.sama-nav__link--dropdown)');
    navLinks.forEach(link => {
      link.addEventListener('click', function() {
        if (window.innerWidth <= 768) {
          nav.classList.remove('sama-nav--open');
          menuToggle.classList.remove('sama-menu-toggle--active');
        }
      });
    });

    // Close menu when clicking outside (mobile)
    document.addEventListener('click', function(event) {
      if (window.innerWidth <= 768) {
        const isClickInsideNav = nav.contains(event.target);
        const isClickOnToggle = menuToggle.contains(event.target);

        if (!isClickInsideNav && !isClickOnToggle && nav.classList.contains('sama-nav--open')) {
          nav.classList.remove('sama-nav--open');
          menuToggle.classList.remove('sama-menu-toggle--active');
        }
      }
    });
  }

  // Header scroll behavior
  window.addEventListener('scroll', function() {
    if (window.pageYOffset > 50) {
      header.classList.add('sama-header--scrolled');
    } else {
      header.classList.remove('sama-header--scrolled');
    }
  });

  // Mobile dropdown toggle
  const dropdownToggles = document.querySelectorAll('.sama-nav__link--dropdown');
  dropdownToggles.forEach(toggle => {
    toggle.addEventListener('click', function(e) {
      if (window.innerWidth <= 768) {
        e.preventDefault();
        const parentItem = this.closest('.sama-nav__item--has-dropdown');
        parentItem.classList.toggle('sama-nav__item--open');

        // Close other dropdowns
        document.querySelectorAll('.sama-nav__item--has-dropdown').forEach(item => {
          if (item !== parentItem) {
            item.classList.remove('sama-nav__item--open');
          }
        });
      }
    });
  });
})();
</script>
