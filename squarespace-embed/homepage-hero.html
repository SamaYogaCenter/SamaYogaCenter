<!-- SAMA YOGA - HOMEPAGE HERO SECTION -->
<!-- This code can be embedded into Squarespace using a Code Block -->

<style>
/* Sama Yoga Hero Section Styles */
.sama-hero-wrapper {
  margin: 0;
  padding: 0;
  width: 100%;
}

.sama-hero {
  position: relative;
  min-height: 60vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background-image: url('https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?w=1920&q=80');
  background-size: cover;
  background-position: center;
  color: white;
  overflow: hidden;
}

.sama-hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.5));
  z-index: 1;
}

.sama-hero__content {
  position: relative;
  z-index: 2;
  text-align: center;
  max-width: 800px;
  padding: 2rem;
}

.sama-hero__title {
  font-size: 2.75rem;
  font-weight: 600;
  margin-bottom: 1rem;
  color: white;
  line-height: 1.1;
}

.sama-hero__subtitle {
  font-size: 1.25rem;
  margin-bottom: 2rem;
  color: #f0f0f0;
  line-height: 1.5;
}

.sama-hero__buttons {
  display: flex;
  gap: 1rem;
  justify-content: center;
  flex-wrap: wrap;
}

.sama-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0.875rem 1.75rem;
  font-size: 0.9rem;
  font-weight: 500;
  line-height: 1;
  border-radius: 8px;
  transition: all 0.25s ease;
  cursor: pointer;
  text-decoration: none;
  min-height: 44px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.sama-btn--primary {
  background-color: #c2185b;
  color: white;
  border: 1px solid transparent;
}

.sama-btn--primary:hover {
  background-color: #880e4f;
  transform: translateY(-2px);
  box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
}

.sama-btn--outline {
  background-color: transparent;
  border: 2px solid white;
  color: white;
}

.sama-btn--outline:hover {
  background-color: rgba(255, 255, 255, 0.1);
  transform: translateY(-2px);
}

/* Mobile responsive */
@media (max-width: 768px) {
  .sama-hero {
    min-height: 50vh;
  }

  .sama-hero__title {
    font-size: 2rem;
  }

  .sama-hero__subtitle {
    font-size: 1rem;
  }

  .sama-hero__buttons {
    flex-direction: column;
    align-items: stretch;
  }

  .sama-btn {
    width: 100%;
  }
}
</style>

<div class="sama-hero-wrapper">
  <section class="sama-hero">
    <div class="sama-hero__content">
      <h1 class="sama-hero__title">Find Your Balance</h1>
      <p class="sama-hero__subtitle">Experience mindful movement and inner peace through our welcoming yoga community</p>
      <div class="sama-hero__buttons">
        <a href="/schedule" class="sama-btn sama-btn--primary">View Schedule</a>
        <a href="/new-to-yoga" class="sama-btn sama-btn--outline">New to Yoga?</a>
      </div>
    </div>
  </section>
</div>
